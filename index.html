<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>滑雪 IMU 动作识别</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --bg: #0f1518;
      --panel: #172126;
      --panel-2: #1f2c32;
      --line: rgba(255,255,255,0.1);
      --text: #f2f7f4;
      --muted: #a9bbb7;
      --blue: #38bdf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --orange: #fb923c;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    body { overflow-x: hidden; }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary { background: #33434a; }
    button.warn { background: #b45309; }
    button.danger { background: #b91c1c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #10191d;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: rgba(56,189,248,0.75);
    }

    #app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #111b20;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .statusText {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .topStats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 8px;
      padding: 6px 9px;
      background: #27353b;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.good { background: #166534; }
    .pill.warn { background: #92400e; }
    .pill.bad { background: #991b1b; }
    .pill.info { background: #075985; }

    .layout {
      display: grid;
      grid-template-columns: minmax(350px, 430px) minmax(0, 1fr);
      min-height: 0;
    }

    aside {
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background: #0e171b;
    }

    .controlGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .wide { grid-column: 1 / -1; }
    .span2 { grid-column: span 2; }
    .half { grid-column: span 1; }

    h2 {
      margin: 18px 0 9px;
      color: #cbd9d5;
      font-size: 14px;
      letter-spacing: 0;
    }

    .scoreGrid,
    .sensorGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.055);
      overflow: hidden;
    }

    .cardTitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .small {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #64727a;
      flex: 0 0 auto;
    }

    .dot.on { background: var(--green); }

    .bar {
      width: 100%;
      height: 10px;
      margin-top: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.12);
    }

    .barFill {
      width: 50%;
      height: 100%;
      border-radius: 999px;
      background: var(--green);
      transition: width 0.18s ease;
    }

    .biasBar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      height: 12px;
      margin-top: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.1);
    }

    #leftBiasFill { background: var(--blue); }
    #rightBiasFill { background: var(--orange); }

    #sceneWrap {
      position: relative;
      min-height: 260px;
      height: 300px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0e171b;
      margin-bottom: 8px;
    }

    #threeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #sceneOverlay {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }

    #chartPanel {
      min-height: 100%;
      padding: 12px;
      background: #121d22;
    }

    #chartCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .feedbackList {
      display: grid;
      gap: 8px;
    }

    .recordTools {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .recordTools input {
      grid-column: 1 / -1;
    }

    .logList {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .logRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: rgba(255,255,255,0.045);
      cursor: pointer;
    }

    .logRow.selected {
      border-color: rgba(56,189,248,0.8);
      background: rgba(56,189,248,0.12);
    }

    .logName {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .logMeta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .feedback {
      border-left: 4px solid #64727a;
      border-radius: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.055);
      color: #dce8e4;
      font-size: 14px;
      line-height: 1.45;
    }

    .feedback.good { border-left-color: var(--green); }
    .feedback.warn { border-left-color: var(--amber); }
    .feedback.bad { border-left-color: var(--red); }
    .feedback.info { border-left-color: var(--blue); }

    @media (max-width: 920px) {
      .topbar { grid-template-columns: 1fr; }
      .topStats { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      main { grid-template-rows: 260px; }
    }

    @media (max-width: 520px) {
      .topbar { padding: 12px; }
      aside { padding: 12px; }
      .controlGrid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .controlGrid > button { grid-column: span 3; }
      .controlGrid > input { grid-column: 1 / -1; }
      #connectWaistBtn,
      #connectLeftBtn,
      #connectRightBtn { grid-column: span 2; }
      #calibrateBtn { grid-column: 1 / -1; }
      .scoreGrid,
      .sensorGrid { grid-template-columns: 1fr; }
      .span2 { grid-column: 1 / -1; }
      .half { grid-column: span 3; }
      #sceneWrap { height: 260px; min-height: 240px; }
      main { grid-template-rows: 240px; }
      .value { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>滑雪 IMU 动作识别</h1>
        <div id="status" class="statusText">至少连接左小腿和右小腿 IMU；腰部 IMU 可选</div>
      </div>
      <div class="topStats">
        <span id="recordingPill" class="pill">未记录</span>
        <span id="hzPill" class="pill info">0 Hz</span>
        <span id="healthPill" class="pill warn">未就绪</span>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div class="controlGrid">
          <button id="connectWaistBtn">连接腰部(可选)</button>
          <button id="connectLeftBtn">连接左腿</button>
          <button id="connectRightBtn">连接右腿</button>
          <section id="sceneWrap" class="wide">
            <canvas id="threeCanvas"></canvas>
            <div id="sceneOverlay">
              <span id="posturePill" class="pill">姿态 --</span>
              <span id="phasePill" class="pill info">窗口 --</span>
            </div>
          </section>
          <input id="sessionNameInput" class="wide" value="滑雪训练记录" maxlength="40" aria-label="记录名称" />
          <button id="calibrateBtn" class="warn wide">静止校准</button>
          <button id="startLogBtn" class="secondary">开始记录</button>
          <button id="stopLogBtn" class="secondary">停止记录</button>
        </div>

        <h2>实时判断</h2>
        <div class="scoreGrid">
          <div class="card">
            <div class="cardTitle">后坐风险 <span id="backwardBadge" class="pill">--</span></div>
            <div id="backwardScore" class="value">--</div>
            <div class="bar"><div id="backwardBar" class="barFill"></div></div>
            <div id="backwardDetail" class="small">等待姿态数据</div>
          </div>
          <div class="card">
            <div class="cardTitle">转腿一致性 <span id="rotationBadge" class="pill">--</span></div>
            <div id="rotationScore" class="value">--</div>
            <div class="bar"><div id="rotationBar" class="barFill"></div></div>
            <div id="rotationDetail" class="small">等待左右小腿数据</div>
          </div>
          <div class="card">
            <div class="cardTitle">重心转换 <span id="comBadge" class="pill">--</span></div>
            <div id="comScore" class="value">--</div>
            <div class="bar"><div id="comBar" class="barFill"></div></div>
            <div id="comDetail" class="small">等待腰部数据</div>
          </div>
          <div class="card">
            <div class="cardTitle">左右承重趋势 <span id="loadBadge" class="pill">估算</span></div>
            <div id="loadBias" class="value">--</div>
            <div class="biasBar">
              <div id="leftBiasFill"></div>
              <div id="rightBiasFill"></div>
            </div>
            <div id="loadDetail" class="small">不是足底真实压力</div>
          </div>
        </div>

        <h2>传感器</h2>
        <div class="sensorGrid">
          <div class="card">
            <div class="cardTitle">腰部 <span id="waistDot" class="dot"></span></div>
            <div id="waistValue" class="value">--</div>
            <div id="waistMeta" class="small">未连接</div>
          </div>
          <div class="card">
            <div class="cardTitle">左小腿 <span id="leftDot" class="dot"></span></div>
            <div id="leftValue" class="value">--</div>
            <div id="leftMeta" class="small">未连接</div>
          </div>
          <div class="card">
            <div class="cardTitle">右小腿 <span id="rightDot" class="dot"></span></div>
            <div id="rightValue" class="value">--</div>
            <div id="rightMeta" class="small">未连接</div>
          </div>
          <div class="card">
            <div class="cardTitle">训练数据</div>
            <div id="recordCount" class="value">0</div>
            <div id="recordMeta" class="small">raw + features JSONL</div>
          </div>
        </div>

        <h2>动作反馈</h2>
        <div id="feedbackList" class="feedbackList"></div>

        <h2>记录管理</h2>
        <div class="recordTools">
          <input id="renameInput" value="" maxlength="40" aria-label="新记录名称" />
          <button id="refreshLogsBtn" class="secondary">刷新</button>
          <button id="renameLogBtn" class="secondary">重命名</button>
          <button id="exportSelectedLogBtn" class="secondary">导出记录</button>
          <button id="openReplayBtn" class="secondary">回放</button>
          <button id="deleteLogBtn" class="danger wide">删除选中</button>
        </div>
        <div id="logList" class="logList"></div>
      </aside>

      <main>
        <section id="chartPanel">
          <canvas id="chartCanvas"></canvas>
        </section>
      </main>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    const IS_ANDROID_APP = Boolean(window.SkiAndroid?.isAndroidApp?.());
    const MAX_SAMPLES = 700;
    const MAX_CHART_POINTS = 260;
    const ROLES = {
      W: { label: '腰部', device: 'SKI-IMU-W', color: '#38bdf8' },
      L: { label: '左小腿', device: 'SKI-IMU-L', color: '#60a5fa' },
      R: { label: '右小腿', device: 'SKI-IMU-R', color: '#fb923c' }
    };

    const sensors = {
      W: createSensorState('W'),
      L: createSensorState('L'),
      R: createSensorState('R')
    };

    const appState = {
      logging: false,
      logRecords: [],
      logCount: 0,
      featureCount: 0,
      sessionName: '滑雪训练记录',
      sessionStartedAt: 0,
      logs: [],
      selectedLogName: '',
      latestMetrics: null,
      chart: { waistRoll: [], leftYaw: [], rightYaw: [] }
    };

    const el = {
      status: document.getElementById('status'),
      recordingPill: document.getElementById('recordingPill'),
      hzPill: document.getElementById('hzPill'),
      healthPill: document.getElementById('healthPill'),
      connectWaistBtn: document.getElementById('connectWaistBtn'),
      connectLeftBtn: document.getElementById('connectLeftBtn'),
      connectRightBtn: document.getElementById('connectRightBtn'),
      sessionNameInput: document.getElementById('sessionNameInput'),
      calibrateBtn: document.getElementById('calibrateBtn'),
      startLogBtn: document.getElementById('startLogBtn'),
      stopLogBtn: document.getElementById('stopLogBtn'),
      openReplayBtn: document.getElementById('openReplayBtn'),
      backwardScore: document.getElementById('backwardScore'),
      backwardBadge: document.getElementById('backwardBadge'),
      backwardBar: document.getElementById('backwardBar'),
      backwardDetail: document.getElementById('backwardDetail'),
      rotationScore: document.getElementById('rotationScore'),
      rotationBadge: document.getElementById('rotationBadge'),
      rotationBar: document.getElementById('rotationBar'),
      rotationDetail: document.getElementById('rotationDetail'),
      comScore: document.getElementById('comScore'),
      comBadge: document.getElementById('comBadge'),
      comBar: document.getElementById('comBar'),
      comDetail: document.getElementById('comDetail'),
      loadBias: document.getElementById('loadBias'),
      loadBadge: document.getElementById('loadBadge'),
      leftBiasFill: document.getElementById('leftBiasFill'),
      rightBiasFill: document.getElementById('rightBiasFill'),
      loadDetail: document.getElementById('loadDetail'),
      waistDot: document.getElementById('waistDot'),
      leftDot: document.getElementById('leftDot'),
      rightDot: document.getElementById('rightDot'),
      waistValue: document.getElementById('waistValue'),
      leftValue: document.getElementById('leftValue'),
      rightValue: document.getElementById('rightValue'),
      waistMeta: document.getElementById('waistMeta'),
      leftMeta: document.getElementById('leftMeta'),
      rightMeta: document.getElementById('rightMeta'),
      recordCount: document.getElementById('recordCount'),
      recordMeta: document.getElementById('recordMeta'),
      feedbackList: document.getElementById('feedbackList'),
      renameInput: document.getElementById('renameInput'),
      refreshLogsBtn: document.getElementById('refreshLogsBtn'),
      renameLogBtn: document.getElementById('renameLogBtn'),
      exportSelectedLogBtn: document.getElementById('exportSelectedLogBtn'),
      deleteLogBtn: document.getElementById('deleteLogBtn'),
      logList: document.getElementById('logList'),
      posturePill: document.getElementById('posturePill'),
      phasePill: document.getElementById('phasePill')
    };

    function createSensorState(id) {
      return {
        id,
        connected: false,
        device: null,
        server: null,
        service: null,
        txChar: null,
        rxChar: null,
        buffer: '',
        samples: [],
        last: null,
        lastSeen: 0,
        lastPacketText: ''
      };
    }

    function clip(x, lo = 0, hi = 1) {
      if (!Number.isFinite(x)) return lo;
      return Math.max(lo, Math.min(hi, x));
    }

    function clampScore(v) {
      return Math.round(clip(v, 0, 100));
    }

    function mean(arr, getter = v => v) {
      let sum = 0;
      let count = 0;
      for (const item of arr) {
        const v = getter(item);
        if (Number.isFinite(v)) {
          sum += v;
          count++;
        }
      }
      return count ? sum / count : NaN;
    }

    function std(arr, getter = v => v) {
      const m = mean(arr, getter);
      if (!Number.isFinite(m)) return NaN;
      let sum = 0;
      let count = 0;
      for (const item of arr) {
        const v = getter(item);
        if (Number.isFinite(v)) {
          sum += (v - m) * (v - m);
          count++;
        }
      }
      return count > 1 ? Math.sqrt(sum / count) : 0;
    }

    function rms(arr, getter) {
      let sum = 0;
      let count = 0;
      for (const item of arr) {
        const v = getter(item);
        if (Number.isFinite(v)) {
          sum += v * v;
          count++;
        }
      }
      return count ? Math.sqrt(sum / count) : NaN;
    }

    function maxAbs(arr, getter) {
      let max = NaN;
      for (const item of arr) {
        const v = Math.abs(getter(item));
        if (Number.isFinite(v) && (!Number.isFinite(max) || v > max)) max = v;
      }
      return max;
    }

    function pushLimited(arr, value, limit) {
      arr.push(value);
      while (arr.length > limit) arr.shift();
    }

    function cleanSessionName(value) {
      const name = String(value || '').trim();
      return name || '未命名记录';
    }

    function formatTime(ms) {
      if (!Number.isFinite(Number(ms)) || Number(ms) <= 0) return '--';
      const d = new Date(Number(ms));
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatSize(bytes) {
      const n = Number(bytes);
      if (!Number.isFinite(n)) return '--';
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }

    function recentSamples(id, seconds = 2) {
      const cutoff = Date.now() - seconds * 1000;
      return sensors[id].samples.filter(s => s.hostTs >= cutoff);
    }

    function firstActiveTime(samples, getter, threshold, minDurationMs = 150) {
      if (samples.length < 2) return null;
      let start = null;
      for (const s of samples) {
        const active = Math.abs(getter(s)) > threshold;
        if (active && start === null) start = s.hostTs;
        if (!active) start = null;
        if (start !== null && s.hostTs - start >= minDurationMs) return start / 1000;
      }
      return null;
    }

    function sampleHz(id) {
      const samples = recentSamples(id, 2);
      if (samples.length < 2) return 0;
      const span = (samples[samples.length - 1].hostTs - samples[0].hostTs) / 1000;
      return span > 0 ? (samples.length - 1) / span : 0;
    }

    function connectedList() {
      return Object.values(sensors).filter(s => s.connected).map(s => ROLES[s.id].label);
    }

    function hasLegPair() {
      return Boolean(sensors.L.last && sensors.R.last);
    }

    function hasWaist() {
      return Boolean(sensors.W.last);
    }

    function parsePacket(line, fallbackId) {
      const text = String(line || '').trim();
      if (!text) return null;

      if (text[0] === '{') {
        const data = JSON.parse(text);
        const id = data.id || fallbackId;
        const rollDeg = Number.isFinite(Number(data.ed)) ? Number(data.ed) : Number(data.r) * 180 / Math.PI;
        const pitchDeg = Number.isFinite(Number(data.pd)) ? Number(data.pd) : Number(data.p) * 180 / Math.PI;
        const yawDeg = Number.isFinite(Number(data.yd)) ? Number(data.yd) : Number(data.y) * 180 / Math.PI;
        return normalizeSample({
          id,
          seq: Number(data.seq || 0),
          sensorMs: Number.isFinite(Number(data.ms)) ? Number(data.ms) : Number(data.t || 0) * 1000,
          ax: Number(data.ax),
          ay: Number(data.ay),
          az: Number(data.az),
          gx: Number(data.gx),
          gy: Number(data.gy),
          gz: Number(data.gz),
          roll: rollDeg,
          pitch: pitchDeg,
          yaw: yawDeg,
          cal: Number(data.cal || 0),
          source: 'json'
        });
      }

      const p = text.split(',');
      if (p[0] !== 'S' || p.length < 14) return null;
      return normalizeSample({
        id: p[1] || fallbackId,
        seq: Number(p[2]),
        sensorMs: Number(p[3]),
        ax: Number(p[4]) / 1000,
        ay: Number(p[5]) / 1000,
        az: Number(p[6]) / 1000,
        gx: Number(p[7]) / 10,
        gy: Number(p[8]) / 10,
        gz: Number(p[9]) / 10,
        roll: Number(p[10]) / 100,
        pitch: Number(p[11]) / 100,
        yaw: Number(p[12]) / 100,
        cal: Number(p[13]),
        source: 'csv'
      });
    }

    function normalizeSample(sample) {
      if (!sample || !ROLES[sample.id]) return null;
      const hostTs = Date.now();
      return {
        kind: 'raw',
        hostTs,
        id: sample.id,
        role: ROLES[sample.id].label,
        seq: Number(sample.seq || 0),
        sensorMs: Number(sample.sensorMs || 0),
        ax: Number(sample.ax),
        ay: Number(sample.ay),
        az: Number(sample.az),
        gx: Number(sample.gx),
        gy: Number(sample.gy),
        gz: Number(sample.gz),
        roll: Number(sample.roll),
        pitch: Number(sample.pitch),
        yaw: Number(sample.yaw),
        cal: Number(sample.cal || 0),
        source: sample.source || 'unknown'
      };
    }

    function applySample(sample) {
      if (!sample) return;
      const sensor = sensors[sample.id];
      sensor.connected = true;
      sensor.last = sample;
      sensor.lastSeen = Date.now();
      sensor.lastPacketText = `${sample.id} #${sample.seq} ${sample.roll.toFixed(1)} ${sample.pitch.toFixed(1)}`;
      pushLimited(sensor.samples, sample, MAX_SAMPLES);

      if (sample.id === 'W') pushLimited(appState.chart.waistRoll, sample.roll, MAX_CHART_POINTS);
      if (sample.id === 'L') pushLimited(appState.chart.leftYaw, sample.gz, MAX_CHART_POINTS);
      if (sample.id === 'R') pushLimited(appState.chart.rightYaw, sample.gz, MAX_CHART_POINTS);

      logLine(sample);
    }

    function logLine(record) {
      if (!appState.logging) return;
      const text = JSON.stringify(record);
      appState.logCount++;
      if (!IS_ANDROID_APP || appState.logRecords.length < 30000) {
        appState.logRecords.push(text);
      }
      if (IS_ANDROID_APP) {
        window.SkiAndroid.appendLogLine(text);
      }
    }

    function scoreClass(score, inverted = false) {
      if (!Number.isFinite(score)) return 'pill';
      const good = inverted ? score <= 30 : score >= 75;
      const warn = inverted ? score <= 60 : score >= 55;
      if (good) return 'pill good';
      if (warn) return 'pill warn';
      return 'pill bad';
    }

    function scoreText(score, inverted = false) {
      if (!Number.isFinite(score)) return '--';
      if (inverted) {
        if (score <= 30) return '低';
        if (score <= 60) return '中';
        return '高';
      }
      if (score >= 75) return '好';
      if (score >= 55) return '一般';
      return '偏差';
    }

    function computePosture() {
      const w = recentSamples('W', 2);
      const l = recentSamples('L', 2);
      const r = recentSamples('R', 2);
      if (w.length < 8 || l.length < 8 || r.length < 8) {
        return {
          ready: false,
          backwardLeanScore: NaN,
          trunkShinAngleDiff: NaN,
          postureStability: NaN,
          detail: '需要腰部 IMU；双腿模式下暂不计算'
        };
      }

      const leftPitch = mean(l, s => s.pitch);
      const rightPitch = mean(r, s => s.pitch);
      const shinAvg = (leftPitch + rightPitch) / 2;
      const trunkPitch = mean(w, s => s.pitch);
      const trunkRollStd = std(w, s => s.roll);
      const trunkPitchStd = std(w, s => s.pitch);
      const shinPitchStd = (std(l, s => s.pitch) + std(r, s => s.pitch)) / 2;
      const gyroRms = rms(w, s => Math.sqrt(s.gx * s.gx + s.gy * s.gy + s.gz * s.gz));
      const trunkShinAngleDiff = Math.abs(trunkPitch - shinAvg);

      const instability =
        0.25 * clip(trunkPitchStd / 10) +
        0.25 * clip(trunkRollStd / 10) +
        0.20 * clip(shinPitchStd / 10) +
        0.30 * clip(gyroRms / 100);
      const postureStability = clampScore(100 * (1 - instability));

      const expectedShinPitch = 12;
      const shinForwardRisk = clip((expectedShinPitch - shinAvg) / expectedShinPitch);
      const trunkBackwardRisk = clip((-trunkPitch) / 15);
      const parallelRisk = clip(trunkShinAngleDiff / 20);
      const stabilityRisk = 1 - postureStability / 100;
      const backwardLeanScore = clampScore(100 * (
        0.40 * shinForwardRisk +
        0.25 * trunkBackwardRisk +
        0.20 * parallelRisk +
        0.15 * stabilityRisk
      ));

      return {
        ready: true,
        leftShinPitch: leftPitch,
        rightShinPitch: rightPitch,
        shinPitchAvg: shinAvg,
        trunkPitch,
        trunkShinAngleDiff,
        postureStability,
        backwardLeanScore,
        detail: `胫骨均值 ${shinAvg.toFixed(1)}°，躯干-胫骨差 ${trunkShinAngleDiff.toFixed(1)}°`
      };
    }

    function integrateYaw(samples) {
      if (samples.length < 2) return NaN;
      let total = 0;
      for (let i = 1; i < samples.length; i++) {
        const dt = (samples[i].hostTs - samples[i - 1].hostTs) / 1000;
        if (dt > 0 && dt < 0.2) total += samples[i].gz * dt;
      }
      return total;
    }

    function activeDuration(samples, threshold) {
      let ms = 0;
      for (let i = 1; i < samples.length; i++) {
        const dt = samples[i].hostTs - samples[i - 1].hostTs;
        if (Math.abs(samples[i].gz) > threshold && dt > 0 && dt < 200) ms += dt;
      }
      return ms / 1000;
    }

    function computeRotation() {
      const l = recentSamples('L', 1.6);
      const r = recentSamples('R', 1.6);
      const w = recentSamples('W', 1.6);
      if (l.length < 8 || r.length < 8) {
        return {
          ready: false,
          score: NaN,
          peakSymmetry: NaN,
          angleSymmetry: NaN,
          onsetDiff: NaN,
          waistLegPhase: NaN,
          detail: '需要左右小腿 yaw rate'
        };
      }

      const leftPeak = maxAbs(l, s => s.gz);
      const rightPeak = maxAbs(r, s => s.gz);
      const peakSymmetry = leftPeak > 1 && rightPeak > 1
        ? Math.min(leftPeak, rightPeak) / Math.max(leftPeak, rightPeak)
        : NaN;

      const leftAngle = integrateYaw(l);
      const rightAngle = integrateYaw(r);
      const angleSymmetry = Math.abs(leftAngle) > 1 && Math.abs(rightAngle) > 1
        ? Math.min(Math.abs(leftAngle), Math.abs(rightAngle)) / Math.max(Math.abs(leftAngle), Math.abs(rightAngle))
        : NaN;

      const threshold = 18;
      const leftOnset = firstActiveTime(l, s => s.gz, threshold);
      const rightOnset = firstActiveTime(r, s => s.gz, threshold);
      const legOnset = leftOnset && rightOnset ? Math.min(leftOnset, rightOnset) : (leftOnset || rightOnset);
      const onsetDiff = leftOnset && rightOnset ? leftOnset - rightOnset : NaN;

      const leftDuration = activeDuration(l, threshold);
      const rightDuration = activeDuration(r, threshold);
      const durationDiff = leftDuration - rightDuration;
      const durationScore = 1 - clip(Math.abs(durationDiff) / 0.8);
      const onsetScore = Number.isFinite(onsetDiff) ? 1 - clip(Math.abs(onsetDiff) / 0.45) : 0.5;

      let waistLegPhase = NaN;
      if (w.length >= 8 && legOnset) {
        const waistOnset = firstActiveTime(w, s => s.gz, 15);
        waistLegPhase = waistOnset ? waistOnset - legOnset : NaN;
      }

      const score = clampScore(100 * (
        0.35 * (Number.isFinite(peakSymmetry) ? peakSymmetry : 0.5) +
        0.25 * (Number.isFinite(angleSymmetry) ? angleSymmetry : 0.5) +
        0.20 * durationScore +
        0.20 * onsetScore
      ));

      return {
        ready: true,
        score,
        leftYawRatePeak: leftPeak,
        rightYawRatePeak: rightPeak,
        leftYawAngleChange: leftAngle,
        rightYawAngleChange: rightAngle,
        peakSymmetry,
        angleSymmetry,
        rotationDurationDiff: durationDiff,
        onsetDiff,
        waistLegPhase,
        detail: `峰值 L/R ${leftPeak.toFixed(0)}/${rightPeak.toFixed(0)}°/s，启动差 ${Number.isFinite(onsetDiff) ? onsetDiff.toFixed(2) + 's' : '--'}`
      };
    }

    function diffSeries(samples, getter) {
      const out = [];
      for (let i = 1; i < samples.length; i++) {
        const dt = (samples[i].hostTs - samples[i - 1].hostTs) / 1000;
        if (dt > 0 && dt < 0.2) {
          out.push({ hostTs: samples[i].hostTs, value: (getter(samples[i]) - getter(samples[i - 1])) / dt });
        }
      }
      return out;
    }

    function computeComShift(rotation) {
      const w = recentSamples('W', 2.4);
      const l = recentSamples('L', 2.4);
      const r = recentSamples('R', 2.4);
      if (w.length < 10) {
        return {
          ready: false,
          score: NaN,
          direction: '--',
          timing: NaN,
          waistRollChange: NaN,
          lateralAccPeak: NaN,
          legWaistPhaseDiff: NaN,
          transitionSmoothness: NaN,
          detail: '需要腰部 IMU；双腿模式下暂不计算'
        };
      }

      const edgeN = Math.max(3, Math.round(w.length * 0.12));
      const startRoll = mean(w.slice(0, edgeN), s => s.roll);
      const endRoll = mean(w.slice(-edgeN), s => s.roll);
      const waistRollChange = endRoll - startRoll;
      const direction = waistRollChange > 3 ? '向右' : waistRollChange < -3 ? '向左' : '不明显';
      const lateralAccPeak = maxAbs(w, s => s.ay);
      const waistRates = diffSeries(w, s => s.roll);
      const waistAcc = diffSeries(waistRates.map(x => ({ hostTs: x.hostTs, v: x.value })), s => s.v);
      const waistJerk = diffSeries(waistAcc.map(x => ({ hostTs: x.hostTs, v: x.value })), s => s.v);
      const lateralJerk = diffSeries(w, s => s.ay);
      const rollRatePeak = maxAbs(waistRates, s => s.value);
      const rollJerkRms = rms(waistJerk, s => s.value);
      const lateralJerkRms = rms(lateralJerk, s => s.value);
      const gyroRms = rms(w, s => Math.sqrt(s.gx * s.gx + s.gy * s.gy + s.gz * s.gz));

      const roughness =
        0.35 * clip(rollJerkRms / 650) +
        0.30 * clip(lateralJerkRms / 4) +
        0.20 * clip(gyroRms / 120) +
        0.15 * clip(rollRatePeak / 140);
      const transitionSmoothness = clampScore(100 * (1 - roughness));

      const waistOnset = firstActiveTime(waistRates.map(x => ({
        hostTs: x.hostTs,
        rate: x.value
      })), s => s.rate, 8);
      const leftOnset = firstActiveTime(l, s => s.gz, 18);
      const rightOnset = firstActiveTime(r, s => s.gz, 18);
      const legOnset = leftOnset && rightOnset ? Math.min(leftOnset, rightOnset) : (leftOnset || rightOnset);
      const legWaistPhaseDiff = waistOnset && legOnset ? waistOnset - legOnset : rotation.waistLegPhase;
      const timingScore = Number.isFinite(legWaistPhaseDiff) ? 1 - clip(Math.abs(legWaistPhaseDiff) / 0.55) : 0.55;
      const directionScore = Math.abs(waistRollChange) >= 3 ? 1 : 0.45;
      const lateralScore = clip(lateralAccPeak / 0.55);
      const phaseScore = timingScore;
      const score = clampScore(
        0.30 * timingScore * 100 +
        0.25 * directionScore * 100 +
        0.20 * transitionSmoothness +
        0.15 * phaseScore * 100 +
        0.10 * lateralScore * 100
      );

      return {
        ready: true,
        score,
        direction,
        timing: legWaistPhaseDiff,
        waistRollChange,
        lateralAccPeak,
        legWaistPhaseDiff,
        transitionSmoothness,
        detail: `方向 ${direction}，腿腰相位 ${Number.isFinite(legWaistPhaseDiff) ? legWaistPhaseDiff.toFixed(2) + 's' : '--'}，平顺 ${transitionSmoothness}`
      };
    }

    function computeLoadBias() {
      const w = recentSamples('W', 2);
      const l = recentSamples('L', 2);
      const r = recentSamples('R', 2);
      if (w.length < 8 || l.length < 8 || r.length < 8) {
        return {
          ready: false,
          bias: NaN,
          leftRatio: NaN,
          rightRatio: NaN,
          label: '--',
          detail: '需要腰部 IMU；双腿模式下暂不估算'
        };
      }

      const waistShiftScore = clip(mean(w, s => s.roll) / 20, -1, 1);
      const lateralForceScore = clip(mean(w, s => s.ay) / 0.6, -1, 1);
      const leftStability = 1 / (1 + std(l, s => s.ax) + std(l, s => s.ay) + std(l, s => s.gz) / 120);
      const rightStability = 1 / (1 + std(r, s => s.ax) + std(r, s => s.ay) + std(r, s => s.gz) / 120);
      const legSupportScore = (rightStability - leftStability) / Math.max(0.001, rightStability + leftStability);
      const leftEnergy = mean(l, s => s.gz * s.gz);
      const rightEnergy = mean(r, s => s.gz * s.gz);
      const legRotationScore = (rightEnergy - leftEnergy) / Math.max(1, rightEnergy + leftEnergy);
      const bias = clip(
        0.35 * waistShiftScore +
        0.30 * lateralForceScore +
        0.20 * legSupportScore +
        0.15 * legRotationScore,
        -1,
        1
      );

      const leftRatio = clip(0.5 - bias * 0.25, 0.15, 0.85);
      const rightRatio = 1 - leftRatio;
      const label = Math.abs(bias) < 0.15 ? '接近均衡' : bias > 0 ? '偏右' : '偏左';
      return {
        ready: true,
        bias,
        leftRatio,
        rightRatio,
        label,
        waistShiftScore,
        lateralForceScore,
        legSupportScore,
        legRotationScore,
        detail: `左 ${Math.round(leftRatio * 100)}% / 右 ${Math.round(rightRatio * 100)}%，趋势 ${label}`
      };
    }

    function computeMetrics() {
      const posture = computePosture();
      const rotation = computeRotation();
      const com = computeComShift(rotation);
      const load = computeLoadBias();
      return {
        kind: 'features',
        hostTs: Date.now(),
        algorithmVersion: 'phone-rules-0.1.0',
        posture,
        rotation,
        com,
        load,
        sampleHz: {
          W: sampleHz('W'),
          L: sampleHz('L'),
          R: sampleHz('R')
        }
      };
    }

    function setScore(elValue, elBadge, elBar, score, inverted = false) {
      elValue.textContent = Number.isFinite(score) ? String(Math.round(score)) : '--';
      elBadge.textContent = scoreText(score, inverted);
      elBadge.className = scoreClass(score, inverted);
      const pct = Number.isFinite(score) ? clip(score, 0, 100) : 0;
      elBar.style.width = `${pct}%`;
      elBar.style.background = inverted
        ? (score <= 30 ? 'var(--green)' : score <= 60 ? 'var(--amber)' : 'var(--red)')
        : (score >= 75 ? 'var(--green)' : score >= 55 ? 'var(--amber)' : 'var(--red)');
    }

    function updateUI() {
      const metrics = appState.latestMetrics || computeMetrics();
      const connected = connectedList();
      const legPairReady = hasLegPair();
      const waistReady = hasWaist();
      const hzs = metrics.sampleHz || { W: 0, L: 0, R: 0 };
      const avgHz = mean(Object.values(hzs));

      el.status.textContent = connected.length
        ? `已连接：${connected.join('、')}`
        : '至少连接左小腿和右小腿 IMU；腰部 IMU 可选';
      el.recordingPill.textContent = appState.logging ? '记录中' : '未记录';
      el.recordingPill.className = appState.logging ? 'pill good' : 'pill';
      el.hzPill.textContent = `${Number.isFinite(avgHz) ? avgHz.toFixed(0) : 0} Hz`;
      if (legPairReady && waistReady) {
        el.healthPill.textContent = '三节点模式';
        el.healthPill.className = 'pill good';
      } else if (legPairReady) {
        el.healthPill.textContent = '双腿模式';
        el.healthPill.className = 'pill good';
      } else {
        el.healthPill.textContent = `${connected.length}/2 腿部节点`;
        el.healthPill.className = 'pill warn';
      }

      updateConnectionButton('W', el.connectWaistBtn, '腰部');
      updateConnectionButton('L', el.connectLeftBtn, '左腿');
      updateConnectionButton('R', el.connectRightBtn, '右腿');

      setScore(el.backwardScore, el.backwardBadge, el.backwardBar, metrics.posture.backwardLeanScore, true);
      el.backwardDetail.textContent = metrics.posture.detail;
      setScore(el.rotationScore, el.rotationBadge, el.rotationBar, metrics.rotation.score, false);
      el.rotationDetail.textContent = metrics.rotation.detail;
      setScore(el.comScore, el.comBadge, el.comBar, metrics.com.score, false);
      el.comDetail.textContent = metrics.com.detail;

      if (metrics.load.ready) {
        el.loadBias.textContent = metrics.load.label;
        el.loadBadge.textContent = '趋势';
        el.loadBadge.className = Math.abs(metrics.load.bias) < 0.15 ? 'pill good' : 'pill warn';
        el.leftBiasFill.style.width = `${metrics.load.leftRatio * 100}%`;
        el.rightBiasFill.style.width = `${metrics.load.rightRatio * 100}%`;
        el.loadDetail.textContent = metrics.load.detail;
      } else {
        el.loadBias.textContent = '--';
        el.loadBadge.textContent = '估算';
        el.loadBadge.className = 'pill';
        el.leftBiasFill.style.width = '50%';
        el.rightBiasFill.style.width = '50%';
        el.loadDetail.textContent = metrics.load.detail;
      }

      renderSensor('W', el.waistDot, el.waistValue, el.waistMeta);
      renderSensor('L', el.leftDot, el.leftValue, el.leftMeta);
      renderSensor('R', el.rightDot, el.rightValue, el.rightMeta);

      el.recordCount.textContent = String(appState.logCount);
      el.recordMeta.textContent = appState.logging
        ? `${appState.sessionName} · ${formatTime(appState.sessionStartedAt)} · ${appState.featureCount} 条特征`
        : `${appState.featureCount} 条特征记录`;
      if (Number.isFinite(metrics.posture.trunkShinAngleDiff)) {
        el.posturePill.textContent = `躯干-胫骨 ${metrics.posture.trunkShinAngleDiff.toFixed(1)}°`;
        el.posturePill.className = metrics.posture.trunkShinAngleDiff < 12 ? 'pill good' : 'pill warn';
      } else {
        el.posturePill.textContent = legPairReady ? '双腿模式' : '姿态 --';
        el.posturePill.className = legPairReady ? 'pill info' : 'pill warn';
      }
      el.phasePill.textContent = metrics.com.ready ? `重心 ${metrics.com.direction}` : '腰部可选';

      renderFeedback(metrics);
    }

    function updateConnectionButton(id, button, label) {
      button.textContent = sensors[id].connected ? `断开${label}` : `连接${label}`;
      button.className = sensors[id].connected ? 'danger' : '';
    }

    function renderSensor(id, dot, value, meta) {
      const sensor = sensors[id];
      const last = sensor.last;
      const fresh = last && Date.now() - sensor.lastSeen < 1500;
      dot.className = sensor.connected && fresh ? 'dot on' : 'dot';
      if (!last) {
        value.textContent = '--';
        meta.textContent = sensor.connected ? '等待数据' : (id === 'W' ? '未连接，可选增强' : '未连接');
        return;
      }
      value.textContent = id === 'W'
        ? `${last.roll.toFixed(1)}°`
        : `${last.pitch.toFixed(1)}°`;
      meta.textContent = `seq ${last.seq} · ${sampleHz(id).toFixed(0)} Hz · ${last.cal ? '已校准' : '未校准'}`;
    }

    function renderFeedback(metrics) {
      const items = [];
      const legPairReady = hasLegPair();
      const waistReady = hasWaist();
      if (!legPairReady) {
        items.push({ level: 'info', text: '先连接左小腿和右小腿 IMU；腰部 IMU 可以后续再加。' });
      } else if (!waistReady) {
        items.push({ level: 'info', text: '当前为双腿模式：可计算左右转腿一致性；后坐、重心转换、承重趋势需要腰部 IMU。' });
      } else if (!metrics.posture.ready) {
        items.push({ level: 'info', text: '腰部和左右小腿已连接，静止校准后开始记录。' });
      } else if (metrics.posture.backwardLeanScore > 65) {
        items.push({ level: 'bad', text: '后坐风险偏高：小腿前倾不足或躯干与胫骨夹角过大。' });
      } else if (metrics.posture.backwardLeanScore > 40) {
        items.push({ level: 'warn', text: '站姿略偏保守：保持胫骨持续向前压，避免重心回到脚跟。' });
      } else {
        items.push({ level: 'good', text: '基础站姿稳定，后坐风险较低。' });
      }

      if (metrics.rotation.ready) {
        if (metrics.rotation.score < 55) {
          items.push({ level: 'warn', text: '左右转腿不够一致：观察峰值、累计角度和启动时机差。' });
        } else {
          items.push({ level: 'good', text: '左右小腿转动节奏基本一致。' });
        }
      }

      if (metrics.com.ready) {
        if (metrics.com.score < 55) {
          items.push({ level: 'warn', text: '重心转换质量偏低：可能存在移动不明显、腿腰相位差大或转换不平顺。' });
        } else {
          items.push({ level: 'good', text: '腰部重心移动趋势清晰，转换相对平顺。' });
        }
      }

      if (metrics.load.ready && Math.abs(metrics.load.bias) > 0.25) {
        items.push({ level: 'info', text: `左右承重趋势${metrics.load.label}。这是 IMU 估算，不代表真实足底压力。` });
      }

      el.feedbackList.innerHTML = '';
      items.slice(0, 5).forEach(item => {
        const div = document.createElement('div');
        div.className = `feedback ${item.level}`;
        div.textContent = item.text;
        el.feedbackList.appendChild(div);
      });
    }

    window.AndroidBle = {
      handleNativeConnection(id, connected) {
        if (!sensors[id]) return;
        sensors[id].connected = connected;
        if (!connected) {
          sensors[id].device = null;
          sensors[id].server = null;
          sensors[id].service = null;
          sensors[id].txChar = null;
          sensors[id].rxChar = null;
          sensors[id].buffer = '';
        }
        updateUI();
      },
      handleNativeLine(id, line) {
        try {
          const sample = parsePacket(line, id);
          applySample(sample);
        } catch (err) {
          console.log('packet parse failed', line, err);
        }
      },
      handleNativeStatus(text) {
        el.status.textContent = text;
      }
    };

    function handleNotify(sensor, event) {
      const text = new TextDecoder().decode(event.target.value);
      sensor.buffer += text;
      let idx;
      while ((idx = sensor.buffer.indexOf('\n')) >= 0) {
        const line = sensor.buffer.slice(0, idx).trim();
        sensor.buffer = sensor.buffer.slice(idx + 1);
        if (!line) continue;
        try {
          applySample(parsePacket(line, sensor.id));
        } catch (err) {
          console.log('packet parse failed', line, err);
        }
      }
      if (sensor.buffer.length > 1200) sensor.buffer = sensor.buffer.slice(-300);
    }

    async function connectSensor(id) {
      const sensor = sensors[id];
      if (IS_ANDROID_APP) {
        if (sensor.connected) {
          window.SkiAndroid.disconnectBoard(id);
        } else {
          window.SkiAndroid.connectBoard(id);
          el.status.textContent = `正在连接${ROLES[id].label}...`;
        }
        return;
      }

      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth，请使用 Android App 或 Chrome。');
        return;
      }

      if (sensor.connected) {
        await disconnectSensor(id);
        return;
      }

      sensor.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });
      sensor.device.addEventListener('gattserverdisconnected', () => {
        sensor.connected = false;
        updateUI();
      });

      sensor.server = await sensor.device.gatt.connect();
      sensor.service = await sensor.server.getPrimaryService(SERVICE_UUID);
      sensor.txChar = await sensor.service.getCharacteristic(TX_UUID);
      sensor.rxChar = await sensor.service.getCharacteristic(RX_UUID);
      await sensor.txChar.startNotifications();
      sensor.txChar.addEventListener('characteristicvaluechanged', event => handleNotify(sensor, event));
      sensor.connected = true;
      updateUI();
    }

    async function disconnectSensor(id) {
      if (IS_ANDROID_APP) {
        window.SkiAndroid.disconnectBoard(id);
        return;
      }
      const sensor = sensors[id];
      if (sensor.device?.gatt?.connected) sensor.device.gatt.disconnect();
      sensor.connected = false;
      updateUI();
    }

    async function sendCalibration() {
      if (IS_ANDROID_APP) {
        window.SkiAndroid.sendCalibration();
        return;
      }
      const payload = new TextEncoder().encode('CAL\n');
      const targets = Object.values(sensors).filter(s => s.connected && s.rxChar);
      if (!targets.length) {
        alert('请先连接至少一个 IMU。');
        return;
      }
      for (const sensor of targets) {
        await sensor.rxChar.writeValue(payload);
      }
    }

    function normalizeLogItem(item) {
      if (typeof item === 'string') {
        return {
          fileName: item,
          sessionName: item,
          startedAt: 0,
          lastModified: 0,
          size: 0,
          rawCount: 0,
          featureCount: 0
        };
      }
      return {
        fileName: item.fileName || item.name || '',
        sessionName: item.sessionName || item.fileName || item.name || '未命名记录',
        startedAt: Number(item.startedAt || 0),
        lastModified: Number(item.lastModified || 0),
        size: Number(item.size || 0),
        rawCount: Number(item.rawCount || 0),
        featureCount: Number(item.featureCount || 0)
      };
    }

    function refreshLogList() {
      if (IS_ANDROID_APP) {
        try {
          const raw = window.SkiAndroid.listLogs();
          appState.logs = JSON.parse(raw || '[]').map(normalizeLogItem);
        } catch (err) {
          console.log('list logs failed', err);
          appState.logs = [];
        }
      }
      renderLogList();
    }

    function renderLogList() {
      if (!el.logList) return;
      el.logList.innerHTML = '';
      if (!appState.logs.length) {
        const empty = document.createElement('div');
        empty.className = 'feedback info';
        empty.textContent = IS_ANDROID_APP ? '暂无历史记录。开始记录后会出现在这里。' : '浏览器模式不保存历史列表，Android App 中可管理多条记录。';
        el.logList.appendChild(empty);
        return;
      }

      appState.logs.forEach(item => {
        const row = document.createElement('div');
        row.className = item.fileName === appState.selectedLogName ? 'logRow selected' : 'logRow';
        row.addEventListener('click', () => {
          appState.selectedLogName = item.fileName;
          el.renameInput.value = item.sessionName;
          renderLogList();
        });

        const info = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'logName';
        name.textContent = item.sessionName;
        const meta = document.createElement('div');
        meta.className = 'logMeta';
        meta.textContent = `${formatTime(item.startedAt || item.lastModified)} · ${formatSize(item.size)} · raw ${item.rawCount} · features ${item.featureCount}`;
        info.appendChild(name);
        info.appendChild(meta);

        const tag = document.createElement('span');
        tag.className = 'pill info';
        tag.textContent = item.fileName === appState.selectedLogName ? '已选' : '选择';

        row.appendChild(info);
        row.appendChild(tag);
        el.logList.appendChild(row);
      });
    }

    function renameSelectedLog() {
      if (!IS_ANDROID_APP) {
        alert('浏览器模式不支持持久化重命名，请在 Android App 中操作。');
        return;
      }
      if (!appState.selectedLogName) {
        alert('请先选择一条记录。');
        return;
      }
      const nextName = cleanSessionName(el.renameInput.value);
      const ok = window.SkiAndroid.renameLog(appState.selectedLogName, nextName);
      if (!ok) {
        alert('重命名失败，可能记录正在写入或文件不存在。');
        return;
      }
      appState.selectedLogName = '';
      refreshLogList();
    }

    function deleteSelectedLog() {
      if (!IS_ANDROID_APP) {
        alert('浏览器模式不支持删除历史记录。');
        return;
      }
      if (!appState.selectedLogName) {
        alert('请先选择一条记录。');
        return;
      }
      if (!confirm('确定删除选中的记录吗？该操作不可恢复。')) return;
      const ok = window.SkiAndroid.deleteLog(appState.selectedLogName);
      if (!ok) {
        alert('删除失败，可能记录正在写入或文件不存在。');
        return;
      }
      appState.selectedLogName = '';
      el.renameInput.value = '';
      refreshLogList();
      el.status.textContent = '选中的记录已删除';
    }

    function exportSelectedLog() {
      if (!IS_ANDROID_APP) {
        exportLog();
        return;
      }
      if (!appState.selectedLogName) {
        alert('请先选择一条记录。');
        return;
      }
      window.SkiAndroid.exportLogByName(appState.selectedLogName);
    }

    function startLog() {
      appState.sessionName = cleanSessionName(el.sessionNameInput.value);
      appState.sessionStartedAt = Date.now();
      appState.logging = true;
      appState.logRecords = [];
      appState.logCount = 0;
      appState.featureCount = 0;
      if (IS_ANDROID_APP) window.SkiAndroid.startLog(appState.sessionName);
      logLine({
        kind: 'session_meta',
        hostTs: appState.sessionStartedAt,
        startedAt: appState.sessionStartedAt,
        sessionName: appState.sessionName,
        schema: 'ski_imu_jsonl_v0',
        roles: ROLES,
        algorithmVersion: 'phone-rules-0.1.0'
      });
      updateUI();
    }

    function stopLog() {
      appState.logging = false;
      if (IS_ANDROID_APP) window.SkiAndroid.stopLog();
      refreshLogList();
      updateUI();
    }

    function exportLog() {
      const content = appState.logRecords.join('\n');
      if (IS_ANDROID_APP) {
        window.SkiAndroid.exportLog(content);
        return;
      }
      const blob = new Blob([content], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ski_imu_${cleanSessionName(appState.sessionName).replace(/[\\/:*?"<>|\\s]+/g, '_')}_${Date.now()}.jsonl`;
      a.click();
      URL.revokeObjectURL(url);
    }

    el.connectWaistBtn.addEventListener('click', () => connectSensor('W').catch(e => alert(e.message)));
    el.connectLeftBtn.addEventListener('click', () => connectSensor('L').catch(e => alert(e.message)));
    el.connectRightBtn.addEventListener('click', () => connectSensor('R').catch(e => alert(e.message)));
    el.calibrateBtn.addEventListener('click', () => sendCalibration().catch(e => alert(e.message)));
    el.startLogBtn.addEventListener('click', startLog);
    el.stopLogBtn.addEventListener('click', stopLog);
    el.openReplayBtn.addEventListener('click', () => { window.location.href = 'replay.html'; });
    el.refreshLogsBtn.addEventListener('click', refreshLogList);
    el.renameLogBtn.addEventListener('click', renameSelectedLog);
    el.exportSelectedLogBtn.addEventListener('click', exportSelectedLog);
    el.deleteLogBtn.addEventListener('click', deleteSelectedLog);

    setInterval(() => {
      const metrics = computeMetrics();
      appState.latestMetrics = metrics;
      if (appState.logging) {
        appState.featureCount++;
        logLine(metrics);
      }
      updateUI();
    }, 500);

    setInterval(() => {
      for (const sensor of Object.values(sensors)) {
        if (sensor.connected && Date.now() - sensor.lastSeen > 2500) {
          sensor.connected = false;
        }
      }
      updateUI();
    }, 1000);

    const chartCanvas = document.getElementById('chartCanvas');
    const chartCtx = chartCanvas.getContext('2d');

    function resizeChart() {
      const rect = chartCanvas.getBoundingClientRect();
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      chartCanvas.width = Math.max(1, rect.width * ratio);
      chartCanvas.height = Math.max(1, rect.height * ratio);
      chartCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function drawChartLine(values, color, scale) {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;
      if (values.length < 2) return;
      chartCtx.beginPath();
      chartCtx.strokeStyle = color;
      chartCtx.lineWidth = 2;
      for (let i = 0; i < values.length; i++) {
        const x = i / Math.max(1, MAX_CHART_POINTS - 1) * w;
        const y = h / 2 - clip(values[i] / scale, -1, 1) * h * 0.42;
        if (i === 0) chartCtx.moveTo(x, y);
        else chartCtx.lineTo(x, y);
      }
      chartCtx.stroke();
    }

    function drawChart() {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;
      chartCtx.clearRect(0, 0, w, h);
      chartCtx.strokeStyle = 'rgba(255,255,255,0.12)';
      chartCtx.lineWidth = 1;
      chartCtx.beginPath();
      chartCtx.moveTo(0, h / 2);
      chartCtx.lineTo(w, h / 2);
      chartCtx.stroke();
      drawChartLine(appState.chart.waistRoll, ROLES.W.color, 35);
      drawChartLine(appState.chart.leftYaw, ROLES.L.color, 220);
      drawChartLine(appState.chart.rightYaw, ROLES.R.color, 220);
      chartCtx.fillStyle = ROLES.W.color;
      chartCtx.fillText('腰部 roll', 10, 18);
      chartCtx.fillStyle = ROLES.L.color;
      chartCtx.fillText('左腿 yaw rate', 92, 18);
      chartCtx.fillStyle = ROLES.R.color;
      chartCtx.fillText('右腿 yaw rate', 206, 18);
      requestAnimationFrame(drawChart);
    }

    const threeCanvas = document.getElementById('threeCanvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0e171b);
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
    camera.position.set(0, 3.8, 8);
    camera.lookAt(0, 1.2, 0);
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    scene.add(new THREE.AmbientLight(0xffffff, 0.68));
    const light = new THREE.DirectionalLight(0xffffff, 0.92);
    light.position.set(4, 7, 5);
    scene.add(light);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 9),
      new THREE.MeshPhongMaterial({ color: 0xdcebe7, shininess: 20 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.04;
    scene.add(floor);

    const rig = new THREE.Group();
    scene.add(rig);
    const waistMesh = new THREE.Mesh(
      new THREE.BoxGeometry(1.25, 0.42, 0.58),
      new THREE.MeshPhongMaterial({ color: 0x38bdf8, shininess: 60 })
    );
    waistMesh.position.set(0, 2.45, 0);
    rig.add(waistMesh);
    const leftShin = createLimb(-0.45, ROLES.L.color);
    const rightShin = createLimb(0.45, ROLES.R.color);
    rig.add(leftShin.group, rightShin.group);

    function createLimb(x, color) {
      const group = new THREE.Group();
      group.position.set(x, 1.05, 0);
      const shin = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 2.0, 0.18),
        new THREE.MeshPhongMaterial({ color, shininess: 50 })
      );
      shin.position.y = 0;
      const boot = new THREE.Mesh(
        new THREE.BoxGeometry(0.42, 0.16, 0.92),
        new THREE.MeshPhongMaterial({ color: 0x26343a, shininess: 30 })
      );
      boot.position.y = -1.05;
      boot.position.z = 0.24;
      group.add(shin, boot);
      return { group, shin, boot };
    }

    function resize3D() {
      const rect = threeCanvas.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / Math.max(1, rect.height);
      camera.updateProjectionMatrix();
    }

    function animate3D() {
      const w = sensors.W.last;
      const l = sensors.L.last;
      const r = sensors.R.last;
      if (w) {
        waistMesh.rotation.z += ((-w.roll * Math.PI / 180) - waistMesh.rotation.z) * 0.15;
        waistMesh.rotation.x += ((w.pitch * Math.PI / 240) - waistMesh.rotation.x) * 0.15;
      }
      if (l) {
        leftShin.group.rotation.x += ((l.pitch * Math.PI / 180) - leftShin.group.rotation.x) * 0.12;
        leftShin.group.rotation.z += ((-l.roll * Math.PI / 240) - leftShin.group.rotation.z) * 0.12;
      }
      if (r) {
        rightShin.group.rotation.x += ((r.pitch * Math.PI / 180) - rightShin.group.rotation.x) * 0.12;
        rightShin.group.rotation.z += ((-r.roll * Math.PI / 240) - rightShin.group.rotation.z) * 0.12;
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate3D);
    }

    window.addEventListener('resize', () => {
      resizeChart();
      resize3D();
    });

    resizeChart();
    resize3D();
    refreshLogList();
    updateUI();
    requestAnimationFrame(drawChart);
    requestAnimationFrame(animate3D);
  </script>
</body>
</html>
