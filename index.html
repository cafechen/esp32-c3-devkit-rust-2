<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 IMU BLE 可视化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #1f2937 0%, #0f172a 100%);
    }
    #panel {
      position: absolute;
      left: 16px;
      top: 16px;
      width: 320px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    #panel h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #38bdf8;
    }
    #connectBtn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: #22c55e;
      color: #08110b;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #connectBtn.disconnect {
      background: #f59e0b;
      color: #1f1300;
    }
    #status {
      font-size: 13px;
      margin-bottom: 12px;
      color: #cbd5e1;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      gap: 12px;
    }
    .label { color: #94a3b8; }
    .value {
      color: #f8fafc;
      font-weight: bold;
      text-align: right;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div id="panel">
      <h2>ESP32 BLE IMU</h2>
      <button id="connectBtn">连接 BLE 设备</button>
      <div id="status">未连接</div>

      <div class="row"><div class="label">时间</div><div class="value" id="time">--</div></div>
      <div class="row"><div class="label">温度</div><div class="value" id="temp">--</div></div>
      <div class="row"><div class="label">湿度</div><div class="value" id="humidity">--</div></div>

      <div class="row"><div class="label">陀螺仪</div><div class="value" id="gyro">--</div></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

    const state = {
      connected: false,
      device: null,
      server: null,
      service: null,
      txChar: null,
      time: 0,
      temp: 0,
      humidity: 0,
      ax: 0, ay: 0, az: 0,
      gx: 0, gy: 0, gz: 0,
      rotX: 0,
      rotY: 0,
      rotZ: 0,
      lastTs: null
    };

    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const timeEl = document.getElementById('time');
    const tempEl = document.getElementById('temp');
    const humidityEl = document.getElementById('humidity');
    const gyroEl = document.getElementById('gyro');

    function updateInfo() {
      timeEl.textContent = Number.isFinite(state.time) ? state.time.toFixed(3) : '--';
      tempEl.textContent = Number.isFinite(state.temp) ? state.temp.toFixed(2) + ' °C' : '--';
      humidityEl.textContent = Number.isFinite(state.humidity) ? state.humidity.toFixed(1) + ' %' : '--';
      gyroEl.textContent = `${state.gx.toFixed(1)}, ${state.gy.toFixed(1)}, ${state.gz.toFixed(1)}`;
      statusEl.textContent = state.connected ? '已连接，正在接收 BLE 数据' : '未连接';
      connectBtn.textContent = state.connected ? '断开连接' : '连接 BLE 设备';
      connectBtn.className = state.connected ? 'disconnect' : '';
    }

    function parseLine(line) {
      try {
        const data = JSON.parse(line);
        if (data.time !== undefined) state.time = Number(data.time);
        if (data.temp !== undefined) state.temp = Number(data.temp);
        if (data.humidity !== undefined) state.humidity = Number(data.humidity);
        if (data.ax !== undefined) state.ax = Number(data.ax);
        if (data.ay !== undefined) state.ay = Number(data.ay);
        if (data.az !== undefined) state.az = Number(data.az);
        if (data.gx !== undefined) state.gx = Number(data.gx);
        if (data.gy !== undefined) state.gy = Number(data.gy);
        if (data.gz !== undefined) state.gz = Number(data.gz);
        updateInfo();
      } catch (e) {
        console.log('bad json:', line);
      }
    }

    function handleNotify(event) {
      const value = event.target.value;
      const text = new TextDecoder().decode(value);
      parseLine(text.trim());
    }

    function onDisconnected() {
      state.connected = false;
      state.device = null;
      state.server = null;
      state.service = null;
      state.txChar = null;
      updateInfo();
    }

    async function connectBLE() {
      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth。请使用 Android Chrome，并通过 HTTPS 打开页面。');
        return;
      }

      state.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      state.device.addEventListener('gattserverdisconnected', onDisconnected);

      state.server = await state.device.gatt.connect();
      state.service = await state.server.getPrimaryService(SERVICE_UUID);
      state.txChar = await state.service.getCharacteristic(TX_UUID);

      await state.txChar.startNotifications();
      state.txChar.addEventListener('characteristicvaluechanged', handleNotify);

      state.connected = true;
      updateInfo();
    }

    async function disconnectBLE() {
      try {
        if (state.txChar) {
          state.txChar.removeEventListener('characteristicvaluechanged', handleNotify);
        }
        if (state.device && state.device.gatt.connected) {
          state.device.gatt.disconnect();
        }
      } finally {
        onDisconnected();
      }
    }

    connectBtn.addEventListener('click', async () => {
      try {
        if (state.connected) {
          await disconnectBLE();
        } else {
          await connectBLE();
        }
      } catch (err) {
        console.error(err);
        alert('连接失败: ' + err.message);
      }
    });

    // ===== Three.js 3D 立体陀螺仪 =====
    const canvas = document.getElementById('canvas');

    // 创建 Three.js 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 8;
    camera.position.x = 1.5;  // 往右挪，避开左侧面板
    camera.position.y = 0;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // 光照
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    // 创建坐标轴组
    const gyroGroup = new THREE.Group();
    scene.add(gyroGroup);

    const axisLen = 4;
    const axisRadius = 0.08;

    // X轴 - 红色 (前后俯仰)
    const xMat = new THREE.MeshPhongMaterial({ color: 0xef4444 });
    const xGeo = new THREE.CylinderGeometry(axisRadius, axisRadius, axisLen, 8);
    const xAxis = new THREE.Mesh(xGeo, xMat);
    xAxis.rotation.z = Math.PI / 2;
    gyroGroup.add(xAxis);
    // X轴箭头
    const xArrowGeo = new THREE.ConeGeometry(0.2, 0.5, 8);
    const xArrow = new THREE.Mesh(xArrowGeo, xMat);
    xArrow.position.set(axisLen / 2 + 0.25, 0, 0);
    xArrow.rotation.z = -Math.PI / 2;
    gyroGroup.add(xArrow);

    // Y轴 - 绿色 (左右横滚)
    const yMat = new THREE.MeshPhongMaterial({ color: 0x22c55e });
    const yGeo = new THREE.CylinderGeometry(axisRadius, axisRadius, axisLen, 8);
    const yAxis = new THREE.Mesh(yGeo, yMat);
    gyroGroup.add(yAxis);
    // Y轴箭头
    const yArrow = new THREE.Mesh(xArrowGeo, yMat);
    yArrow.position.set(0, axisLen / 2 + 0.25, 0);
    gyroGroup.add(yArrow);

    // Z轴 - 蓝色 (偏航旋转)
    const zMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 });
    const zGeo = new THREE.CylinderGeometry(axisRadius, axisRadius, axisLen, 8);
    const zAxis = new THREE.Mesh(zGeo, zMat);
    zAxis.rotation.x = Math.PI / 2;
    gyroGroup.add(zAxis);
    // Z轴箭头
    const zArrow = new THREE.Mesh(xArrowGeo, zMat);
    zArrow.position.set(0, 0, axisLen / 2 + 0.25);
    zArrow.rotation.x = Math.PI / 2;
    gyroGroup.add(zArrow);

    // 中心球体
    const centerGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const centerMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xfbbf24, emissiveIntensity: 0.5 });
    const center = new THREE.Mesh(centerGeo, centerMat);
    gyroGroup.add(center);

    // 三个正交圆环
    const ringMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
    const ringGeo = new THREE.TorusGeometry(axisLen * 0.65, 0.05, 8, 48);

    const ringX = new THREE.Mesh(ringGeo, ringMat);
    ringX.rotation.y = Math.PI / 2;
    gyroGroup.add(ringX);

    const ringY = new THREE.Mesh(ringGeo, ringMat);
    ringY.rotation.x = Math.PI / 2;
    gyroGroup.add(ringY);

    const ringZ = new THREE.Mesh(ringGeo, ringMat);
    gyroGroup.add(ringZ);

    // 窗口调整
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 鼠标滚轮缩放
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomSpeed = 0.001;
      camera.position.z = Math.max(3, Math.min(20, camera.position.z + e.deltaY * zoomSpeed));
    }, { passive: false });

    // 手机双指缩放 + 单指平移
    let lastTouchDist = 0;
    let lastTouchX = 0, lastTouchY = 0;
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
      } else if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const delta = lastTouchDist - dist;
        camera.position.z = Math.max(3, Math.min(20, camera.position.z + delta * 0.02));
        lastTouchDist = dist;
      } else if (e.touches.length === 1) {
        const moveSpeed = 0.008;
        camera.position.x += (e.touches[0].clientX - lastTouchX) * moveSpeed;
        camera.position.y -= (e.touches[0].clientY - lastTouchY) * moveSpeed;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    }, { passive: false });

    // 鼠标拖拽平移
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const moveSpeed = 0.008;
        camera.position.x += (e.clientX - lastMouseX) * moveSpeed;
        camera.position.y -= (e.clientY - lastMouseY) * moveSpeed;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      }
    });
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);

    // 动画循环
    function animate3D(ts) {
      if (state.lastTs == null) state.lastTs = ts;
      const dt = Math.max(0.016, (ts - state.lastTs) / 1000);
      state.lastTs = ts;

      // 陀螺仪积分计算旋转 (ICM42670P 原始值 -> 弧度)
      state.rotX += state.gx * 0.00015;
      state.rotY += state.gy * 0.00015;
      state.rotZ += state.gz * 0.00015;

      // 轻微回正
      state.rotX *= 0.998;
      state.rotY *= 0.998;
      state.rotZ *= 0.998;

      // 真正的 3D 旋转
      gyroGroup.rotation.x = state.rotX;
      gyroGroup.rotation.y = state.rotZ;
      gyroGroup.rotation.z = state.rotY;

      renderer.render(scene, camera);
      requestAnimationFrame(animate3D);
    }

    updateInfo();
    requestAnimationFrame(animate3D);
  </script>
</body>
</html>
