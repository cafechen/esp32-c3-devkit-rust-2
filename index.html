<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 IMU BLE 可视化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #1f2937 0%, #0f172a 100%);
    }
    #panel {
      position: absolute;
      left: 16px;
      top: 16px;
      width: 320px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    #panel h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #38bdf8;
    }
    #connectBtn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: #22c55e;
      color: #08110b;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #connectBtn.disconnect {
      background: #f59e0b;
      color: #1f1300;
    }
    #status {
      font-size: 13px;
      margin-bottom: 12px;
      color: #cbd5e1;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      gap: 12px;
    }
    .label { color: #94a3b8; }
    .value {
      color: #f8fafc;
      font-weight: bold;
      text-align: right;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div id="panel">
      <h2>ESP32 BLE IMU</h2>
      <button id="connectBtn">连接 BLE 设备</button>
      <div id="status">未连接</div>

      <div class="row"><div class="label">时间</div><div class="value" id="time">--</div></div>
      <div class="row"><div class="label">温度</div><div class="value" id="temp">--</div></div>
      <div class="row"><div class="label">湿度</div><div class="value" id="humidity">--</div></div>

      <div class="row"><div class="label">加速度</div><div class="value" id="accel">--</div></div>
      <div class="row"><div class="label">陀螺仪</div><div class="value" id="gyro">--</div></div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

    const state = {
      connected: false,
      device: null,
      server: null,
      service: null,
      txChar: null,
      time: 0,
      temp: 0,
      humidity: 0,
      ax: 0, ay: 0, az: 0,
      gx: 0, gy: 0, gz: 0,
      rotX: 0,
      rotY: 0,
      rotZ: 0,
      lastTs: null
    };

    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const timeEl = document.getElementById('time');
    const tempEl = document.getElementById('temp');
    const humidityEl = document.getElementById('humidity');
    const accelEl = document.getElementById('accel');
    const gyroEl = document.getElementById('gyro');

    function updateInfo() {
      timeEl.textContent = Number.isFinite(state.time) ? state.time.toFixed(3) : '--';
      tempEl.textContent = Number.isFinite(state.temp) ? state.temp.toFixed(2) + ' °C' : '--';
      humidityEl.textContent = Number.isFinite(state.humidity) ? state.humidity.toFixed(1) + ' %' : '--';
      accelEl.textContent = `${state.ax.toFixed(1)}, ${state.ay.toFixed(1)}, ${state.az.toFixed(1)}`;
      gyroEl.textContent = `${state.gx.toFixed(1)}, ${state.gy.toFixed(1)}, ${state.gz.toFixed(1)}`;
      statusEl.textContent = state.connected ? '已连接，正在接收 BLE 数据' : '未连接';
      connectBtn.textContent = state.connected ? '断开连接' : '连接 BLE 设备';
      connectBtn.className = state.connected ? 'disconnect' : '';
    }

    function parseLine(line) {
      try {
        const data = JSON.parse(line);
        if (data.time !== undefined) state.time = Number(data.time);
        if (data.temp !== undefined) state.temp = Number(data.temp);
        if (data.humidity !== undefined) state.humidity = Number(data.humidity);
        if (data.ax !== undefined) state.ax = Number(data.ax);
        if (data.ay !== undefined) state.ay = Number(data.ay);
        if (data.az !== undefined) state.az = Number(data.az);
        if (data.gx !== undefined) state.gx = Number(data.gx);
        if (data.gy !== undefined) state.gy = Number(data.gy);
        if (data.gz !== undefined) state.gz = Number(data.gz);
        updateInfo();
      } catch (e) {
        console.log('bad json:', line);
      }
    }

    function handleNotify(event) {
      const value = event.target.value;
      const text = new TextDecoder().decode(value);
      parseLine(text.trim());
    }

    function onDisconnected() {
      state.connected = false;
      state.device = null;
      state.server = null;
      state.service = null;
      state.txChar = null;
      updateInfo();
    }

    async function connectBLE() {
      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth。请使用 Android Chrome，并通过 HTTPS 打开页面。');
        return;
      }

      state.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      state.device.addEventListener('gattserverdisconnected', onDisconnected);

      state.server = await state.device.gatt.connect();
      state.service = await state.server.getPrimaryService(SERVICE_UUID);
      state.txChar = await state.service.getCharacteristic(TX_UUID);

      await state.txChar.startNotifications();
      state.txChar.addEventListener('characteristicvaluechanged', handleNotify);

      state.connected = true;
      updateInfo();
    }

    async function disconnectBLE() {
      try {
        if (state.txChar) {
          state.txChar.removeEventListener('characteristicvaluechanged', handleNotify);
        }
        if (state.device && state.device.gatt.connected) {
          state.device.gatt.disconnect();
        }
      } finally {
        onDisconnected();
      }
    }

    connectBtn.addEventListener('click', async () => {
      try {
        if (state.connected) {
          await disconnectBLE();
        } else {
          await connectBLE();
        }
      } catch (err) {
        console.error(err);
        alert('连接失败: ' + err.message);
      }
    });

    // ===== 简单 2D 姿态板子 =====
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function drawBoard(cx, cy, w, h, rx, ry, rz) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rz * 0.25);

      const sx = 1 + Math.max(-0.25, Math.min(0.25, ry));
      const sy = 1 + Math.max(-0.25, Math.min(0.25, rx));
      ctx.scale(sx, sy);

      ctx.fillStyle = '#0f9d58';
      ctx.strokeStyle = '#d1fae5';
      ctx.lineWidth = 2;

      const r = 20;
      ctx.beginPath();
      ctx.moveTo(-w/2 + r, -h/2);
      ctx.lineTo(w/2 - r, -h/2);
      ctx.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
      ctx.lineTo(w/2, h/2 - r);
      ctx.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
      ctx.lineTo(-w/2 + r, h/2);
      ctx.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
      ctx.lineTo(-w/2, -h/2 + r);
      ctx.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(-w/2 - 8, -h/2 + 18 + i * 20, 6, 6);
        ctx.fillRect(w/2 + 2, -h/2 + 18 + i * 20, 6, 6);
      }

      ctx.restore();
    }

    function animate(ts) {
      if (state.lastTs == null) state.lastTs = ts;
      const dt = Math.max(0.016, (ts - state.lastTs) / 1000);
      state.lastTs = ts;

      // 粗略姿态演示
      state.rotX += state.gx * 0.0002;
      state.rotY += state.gy * 0.0002;
      state.rotZ += state.gz * 0.0002;

      // 加一点回正，避免无限漂移
      state.rotX *= 0.995;
      state.rotY *= 0.995;
      state.rotZ *= 0.995;

      const w = window.innerWidth;
      const h = window.innerHeight;

      ctx.clearRect(0, 0, w, h);

      // 背景网格
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x < w; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      // 板子
      drawBoard(w * 0.68, h * 0.55, 140, 240, state.rotX, state.rotY, state.rotZ);

      requestAnimationFrame(animate);
    }

    updateInfo();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
