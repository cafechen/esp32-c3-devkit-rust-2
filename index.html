<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 IMU BLE 可视化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #1f2937 0%, #0f172a 100%);
    }
    #panel {
      position: absolute;
      left: 16px;
      top: 16px;
      width: 340px;
      background: rgba(0, 0, 0, 0.58);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    #panel h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #38bdf8;
    }
    #connectBtn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: #22c55e;
      color: #08110b;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #connectBtn.disconnect {
      background: #f59e0b;
      color: #1f1300;
    }
    #status {
      font-size: 13px;
      margin-bottom: 12px;
      color: #cbd5e1;
      min-height: 18px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      gap: 12px;
    }
    .label { color: #94a3b8; }
    .value {
      color: #f8fafc;
      font-weight: bold;
      text-align: right;
      word-break: break-word;
    }
    .section-title {
      margin-top: 14px;
      margin-bottom: 6px;
      color: #67e8f9;
      font-size: 13px;
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div id="panel">
      <h2>ESP32 BLE IMU</h2>
      <button id="connectBtn">连接 BLE 设备</button>
      <div id="status">未连接</div>

      <div class="row"><div class="label">时间</div><div class="value" id="time">--</div></div>
      <div class="row"><div class="label">温度</div><div class="value" id="temp">--</div></div>
      <div class="row"><div class="label">湿度</div><div class="value" id="humidity">--</div></div>

      <div class="section-title">加速度</div>
      <div class="row"><div class="label">ax, ay, az</div><div class="value" id="accel">--</div></div>

      <div class="section-title">陀螺仪</div>
      <div class="row"><div class="label">gx, gy, gz</div><div class="value" id="gyro">--</div></div>

      <div class="section-title">姿态角</div>
      <div class="row"><div class="label">roll / pitch / yaw</div><div class="value" id="rpy">--</div></div>

      <div class="hint">
        手势：<br />
        单指拖动平移视角<br />
        双指缩放 / 鼠标滚轮缩放
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ===== BLE UUID =====
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    // ===== 传感器参数（与你当前 ESP32 配置一致）=====
    // ESP32端: startGyro(100, 2000), startAccel(100, 16)
    const GYRO_DPS_PER_LSB = 2000 / 32768.0;
    const DEG_TO_RAD = Math.PI / 180.0;
    const RAD_TO_DEG = 180.0 / Math.PI;
    const GYRO_RAD_PER_LSB = GYRO_DPS_PER_LSB * DEG_TO_RAD;

    // 如果 ax/ay/az 是原始计数值，可按 ±16g 近似换算
    const ACC_G_PER_LSB = 16 / 32768.0;

    // ===== 可调参数 =====
    const gyroDeadband = 10;       // 陀螺仪死区，越大越稳，越不灵敏
    const accelCorrection = 0.02;  // 互补滤波系数，0.01~0.05
    const yawDamping = 0.9995;     // Z轴阻尼，越小越不漂，但越“钝”
    const maxDt = 0.05;            // 防止页面卡顿后dt过大
    const minDt = 0.005;

    const state = {
      connected: false,
      device: null,
      server: null,
      service: null,
      txChar: null,

      time: 0,
      temp: 0,
      humidity: 0,
      ax: 0, ay: 0, az: 0,
      gx: 0, gy: 0, gz: 0,

      rotX: 0,   // roll
      rotY: 0,   // pitch
      rotZ: 0,   // yaw

      lastAnimTs: null
    };

    // ===== DOM =====
    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const timeEl = document.getElementById('time');
    const tempEl = document.getElementById('temp');
    const humidityEl = document.getElementById('humidity');
    const accelEl = document.getElementById('accel');
    const gyroEl = document.getElementById('gyro');
    const rpyEl = document.getElementById('rpy');

    function updateInfo() {
      timeEl.textContent = Number.isFinite(state.time) ? state.time.toFixed(3) : '--';
      tempEl.textContent = Number.isFinite(state.temp) ? `${state.temp.toFixed(2)} °C` : '--';
      humidityEl.textContent = Number.isFinite(state.humidity) ? `${state.humidity.toFixed(1)} %` : '--';
      accelEl.textContent = `${state.ax.toFixed(1)}, ${state.ay.toFixed(1)}, ${state.az.toFixed(1)}`;
      gyroEl.textContent = `${state.gx.toFixed(1)}, ${state.gy.toFixed(1)}, ${state.gz.toFixed(1)}`;
      rpyEl.textContent = `${(state.rotX * RAD_TO_DEG).toFixed(1)}°, ${(state.rotY * RAD_TO_DEG).toFixed(1)}°, ${(state.rotZ * RAD_TO_DEG).toFixed(1)}°`;

      statusEl.textContent = state.connected ? '已连接，正在接收 BLE 数据' : '未连接';
      connectBtn.textContent = state.connected ? '断开连接' : '连接 BLE 设备';
      connectBtn.className = state.connected ? 'disconnect' : '';
    }

    function parseLine(line) {
      try {
        const data = JSON.parse(line);
        if (data.time !== undefined) state.time = Number(data.time);
        if (data.temp !== undefined) state.temp = Number(data.temp);
        if (data.humidity !== undefined) state.humidity = Number(data.humidity);
        if (data.ax !== undefined) state.ax = Number(data.ax);
        if (data.ay !== undefined) state.ay = Number(data.ay);
        if (data.az !== undefined) state.az = Number(data.az);
        if (data.gx !== undefined) state.gx = Number(data.gx);
        if (data.gy !== undefined) state.gy = Number(data.gy);
        if (data.gz !== undefined) state.gz = Number(data.gz);
        updateInfo();
      } catch (e) {
        console.log('bad json:', line);
      }
    }

    function handleNotify(event) {
      const value = event.target.value;
      const text = new TextDecoder().decode(value);
      parseLine(text.trim());
    }

    function onDisconnected() {
      state.connected = false;
      state.device = null;
      state.server = null;
      state.service = null;
      state.txChar = null;
      updateInfo();
    }

    async function connectBLE() {
      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth。请使用 Android Chrome，并通过 HTTPS 打开页面。');
        return;
      }

      state.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      state.device.addEventListener('gattserverdisconnected', onDisconnected);

      state.server = await state.device.gatt.connect();
      state.service = await state.server.getPrimaryService(SERVICE_UUID);
      state.txChar = await state.service.getCharacteristic(TX_UUID);

      await state.txChar.startNotifications();
      state.txChar.addEventListener('characteristicvaluechanged', handleNotify);

      state.connected = true;
      updateInfo();
    }

    async function disconnectBLE() {
      try {
        if (state.txChar) {
          state.txChar.removeEventListener('characteristicvaluechanged', handleNotify);
        }
        if (state.device && state.device.gatt.connected) {
          state.device.gatt.disconnect();
        }
      } finally {
        onDisconnected();
      }
    }

    connectBtn.addEventListener('click', async () => {
      try {
        if (state.connected) {
          await disconnectBLE();
        } else {
          await connectBLE();
        }
      } catch (err) {
        console.error(err);
        if (err && err.message && err.message.includes('User cancelled')) {
          return;
        }
        alert('连接失败: ' + err.message);
      }
    });

    // ===== Three.js =====
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(1.8, 0.2, 8);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // 光照
    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(5, 5, 6);
    scene.add(dirLight);

    // 坐标轴组
    const gyroGroup = new THREE.Group();
    scene.add(gyroGroup);

    const axisLen = 4;
    const axisRadius = 0.08;

    // X轴 红
    const xMat = new THREE.MeshPhongMaterial({ color: 0xef4444 });
    const xGeo = new THREE.CylinderGeometry(axisRadius, axisRadius, axisLen, 8);
    const xAxis = new THREE.Mesh(xGeo, xMat);
    xAxis.rotation.z = Math.PI / 2;
    gyroGroup.add(xAxis);

    const coneGeo = new THREE.ConeGeometry(0.2, 0.5, 8);
    const xArrow = new THREE.Mesh(coneGeo, xMat);
    xArrow.position.set(axisLen / 2 + 0.25, 0, 0);
    xArrow.rotation.z = -Math.PI / 2;
    gyroGroup.add(xArrow);

    // Y轴 绿
    const yMat = new THREE.MeshPhongMaterial({ color: 0x22c55e });
    const yAxis = new THREE.Mesh(xGeo, yMat);
    gyroGroup.add(yAxis);

    const yArrow = new THREE.Mesh(coneGeo, yMat);
    yArrow.position.set(0, axisLen / 2 + 0.25, 0);
    gyroGroup.add(yArrow);

    // Z轴 蓝
    const zMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 });
    const zAxis = new THREE.Mesh(xGeo, zMat);
    zAxis.rotation.x = Math.PI / 2;
    gyroGroup.add(zAxis);

    const zArrow = new THREE.Mesh(coneGeo, zMat);
    zArrow.position.set(0, 0, axisLen / 2 + 0.25);
    zArrow.rotation.x = Math.PI / 2;
    gyroGroup.add(zArrow);

    // 中心球
    const center = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 20, 20),
      new THREE.MeshPhongMaterial({
        color: 0xffffff,
        emissive: 0xfbbf24,
        emissiveIntensity: 0.45
      })
    );
    gyroGroup.add(center);

    // 三个正交环
    const ringMat = new THREE.MeshPhongMaterial({
      color: 0x38bdf8,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide
    });
    const ringGeo = new THREE.TorusGeometry(axisLen * 0.65, 0.05, 8, 48);

    const ringX = new THREE.Mesh(ringGeo, ringMat);
    ringX.rotation.y = Math.PI / 2;
    gyroGroup.add(ringX);

    const ringY = new THREE.Mesh(ringGeo, ringMat);
    ringY.rotation.x = Math.PI / 2;
    gyroGroup.add(ringY);

    const ringZ = new THREE.Mesh(ringGeo, ringMat);
    gyroGroup.add(ringZ);

    // ===== 工具函数 =====
    function deadband(v, threshold) {
      return Math.abs(v) < threshold ? 0 : v;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    // ===== 视角交互 =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z = clamp(camera.position.z + e.deltaY * 0.001, 3, 20);
    }, { passive: false });

    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const moveSpeed = 0.008;
      camera.position.x += (e.clientX - lastMouseX) * moveSpeed;
      camera.position.y -= (e.clientY - lastMouseY) * moveSpeed;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('mouseleave', () => { isDragging = false; });

    let lastTouchDist = 0;
    let lastTouchX = 0;
    let lastTouchY = 0;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
      } else if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();

      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const delta = lastTouchDist - dist;
        camera.position.z = clamp(camera.position.z + delta * 0.02, 3, 20);
        lastTouchDist = dist;
      } else if (e.touches.length === 1) {
        const moveSpeed = 0.008;
        camera.position.x += (e.touches[0].clientX - lastTouchX) * moveSpeed;
        camera.position.y -= (e.touches[0].clientY - lastTouchY) * moveSpeed;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    }, { passive: false });

    // ===== 动画主循环 =====
    function animate3D(ts) {
      if (state.lastAnimTs == null) state.lastAnimTs = ts;
      let dt = (ts - state.lastAnimTs) / 1000;
      state.lastAnimTs = ts;
      dt = clamp(dt, minDt, maxDt);

      // 1) 陀螺仪死区
      const gxRaw = deadband(state.gx, gyroDeadband);
      const gyRaw = deadband(state.gy, gyroDeadband);
      const gzRaw = deadband(state.gz, gyroDeadband);

      // 2) 原始值 -> rad/s
      const gxRad = gxRaw * GYRO_RAD_PER_LSB;
      const gyRad = gyRaw * GYRO_RAD_PER_LSB;
      const gzRad = gzRaw * GYRO_RAD_PER_LSB;

      // 3) 陀螺仪积分
      state.rotX += gxRad * dt;   // roll
      state.rotY += gyRad * dt;   // pitch
      state.rotZ += gzRad * dt;   // yaw

      // 4) 加速度回正（只修正 X/Y，不碰 Z）
      const ax = state.ax * ACC_G_PER_LSB;
      const ay = state.ay * ACC_G_PER_LSB;
      const az = state.az * ACC_G_PER_LSB;

      const norm = Math.sqrt(ax * ax + ay * ay + az * az);
      if (norm > 1e-6) {
        const axn = ax / norm;
        const ayn = ay / norm;
        const azn = az / norm;

        // 常见 roll/pitch 估计
        const accelRoll = Math.atan2(ayn, azn);
        const accelPitch = Math.atan2(-axn, Math.sqrt(ayn * ayn + azn * azn));

        state.rotX = state.rotX * (1 - accelCorrection) + accelRoll * accelCorrection;
        state.rotY = state.rotY * (1 - accelCorrection) + accelPitch * accelCorrection;
      }

      // 5) yaw 轻微阻尼，防漂
      state.rotZ *= yawDamping;

      // 6) 赋给 Three.js
      gyroGroup.rotation.x = state.rotX;
      gyroGroup.rotation.y = state.rotZ;
      gyroGroup.rotation.z = state.rotY;

      updateInfo();
      renderer.render(scene, camera);
      requestAnimationFrame(animate3D);
    }

    updateInfo();
    requestAnimationFrame(animate3D);
  </script>
</body>
</html>
