<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双板滑雪 IMU 训练面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #101820;
      color: #eef5f2;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    body { overflow-x: hidden; }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2f80ed;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { background: #31424f; }
    button.warn { background: #d97706; }
    button.danger { background: #b91c1c; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
    }

    #sidePanel {
      min-height: 100vh;
      padding: 18px;
      background: #17232d;
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
    }

    #stage {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    #threeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    h1 {
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 15px;
      color: #b7c7c9;
      margin: 18px 0 8px;
      letter-spacing: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .wide { grid-column: 1 / -1; }

    .statusLine {
      min-height: 20px;
      margin-top: 10px;
      color: #b7c7c9;
      font-size: 13px;
      line-height: 1.45;
    }

    .metricGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card {
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px;
      min-height: 76px;
    }

    .cardTitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #b7c7c9;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #5b6872;
      flex: 0 0 auto;
    }

    .dot.on { background: #22c55e; }

    .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.15;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .smallValue {
      margin-top: 4px;
      color: #b7c7c9;
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 8px;
      padding: 6px 10px;
      background: #31424f;
      color: #f8fafc;
      font-weight: 800;
      font-size: 13px;
    }

    .badge.good { background: #15803d; }
    .badge.warn { background: #b45309; }
    .badge.bad { background: #b91c1c; }
    .badge.info { background: #2563eb; }

    #insight {
      display: grid;
      gap: 8px;
    }

    .feedback {
      border-radius: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.055);
      border-left: 4px solid #5b6872;
      color: #dbe7e5;
      font-size: 14px;
      line-height: 1.45;
    }

    .feedback.good { border-left-color: #22c55e; }
    .feedback.warn { border-left-color: #f59e0b; }
    .feedback.bad { border-left-color: #ef4444; }
    .feedback.info { border-left-color: #60a5fa; }

    .loadBar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 3px;
      width: 100%;
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      margin-top: 8px;
    }

    .loadLeft { background: #60a5fa; }
    .loadRight { background: #fb923c; }

    #chartWrap {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      height: 190px;
      border-radius: 8px;
      background: rgba(10,16,20,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px;
    }

    #chartCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #eventFlash {
      position: absolute;
      top: 18px;
      left: 18px;
      min-width: 148px;
      border-radius: 8px;
      padding: 12px 14px;
      background: rgba(37,99,235,0.92);
      color: #ffffff;
      font-size: 22px;
      font-weight: 900;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      pointer-events: none;
    }

    #eventFlash.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; }
      #sidePanel { min-height: auto; border-right: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
      #stage { min-height: 520px; }
      #chartWrap { left: 10px; right: 10px; bottom: 10px; height: 150px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidePanel">
      <h1>双板滑雪 IMU</h1>

      <div class="controls">
        <button id="connectLeftBtn">连接左板</button>
        <button id="connectRightBtn">连接右板</button>
        <button id="calibrateBtn" class="warn wide">静止校准</button>
        <button id="startLogBtn" class="secondary">开始记录</button>
        <button id="stopLogBtn" class="secondary">停止记录</button>
        <button id="downloadLogBtn" class="secondary wide">导出日志</button>
        <button id="openReplayBtn" class="secondary wide">回放日志</button>
      </div>

      <div id="status" class="statusLine">未连接。请先分别连接左右板，再让双板平放并点击静止校准。</div>

      <h2>核心指标</h2>
      <div class="metricGrid">
        <div class="card">
          <div class="cardTitle">同步分 <span id="syncBadge" class="badge info">--</span></div>
          <div class="value" id="syncScore">--</div>
          <div class="smallValue">左右立刃角差越小越好</div>
        </div>
        <div class="card">
          <div class="cardTitle">当前阶段 <span id="phaseBadge" class="badge">--</span></div>
          <div class="value" id="globalPhase">--</div>
          <div class="smallValue" id="turnText">等待数据</div>
        </div>
        <div class="card">
          <div class="cardTitle">平均立刃角</div>
          <div class="value" id="avgEdge">--</div>
          <div class="smallValue">左右绝对值平均</div>
        </div>
        <div class="card">
          <div class="cardTitle">换刃次数</div>
          <div class="value" id="edgeChanges">--</div>
          <div class="smallValue">来自左右节点计数的最大值</div>
        </div>
        <div class="card wide">
          <div class="cardTitle">承重估计 <span id="loadConfidenceBadge" class="badge info">--</span></div>
          <div class="value" id="loadGuess">--</div>
          <div class="loadBar">
            <div id="loadLeftBar" class="loadLeft"></div>
            <div id="loadRightBar" class="loadRight"></div>
          </div>
          <div class="smallValue" id="loadDetail">基于立刃角、加速度模长和 Roll 角速度的趋势估计</div>
        </div>
      </div>

      <h2>左板</h2>
      <div class="metricGrid">
        <div class="card">
          <div class="cardTitle">连接 <span id="leftDot" class="dot"></span></div>
          <div class="value" id="leftEdge">--</div>
          <div class="smallValue" id="leftMeta">未连接</div>
        </div>
        <div class="card">
          <div class="cardTitle">阶段</div>
          <div class="value" id="leftPhase">--</div>
          <div class="smallValue" id="leftRaw">--</div>
        </div>
        <div class="card wide">
          <div class="cardTitle">脚掌承重点估计</div>
          <div class="value" id="leftFootSpot">--</div>
          <div class="smallValue" id="leftFootDetail">趋势估计，不是真实足底压力中心</div>
        </div>
      </div>

      <h2>右板</h2>
      <div class="metricGrid">
        <div class="card">
          <div class="cardTitle">连接 <span id="rightDot" class="dot"></span></div>
          <div class="value" id="rightEdge">--</div>
          <div class="smallValue" id="rightMeta">未连接</div>
        </div>
        <div class="card">
          <div class="cardTitle">阶段</div>
          <div class="value" id="rightPhase">--</div>
          <div class="smallValue" id="rightRaw">--</div>
        </div>
        <div class="card wide">
          <div class="cardTitle">脚掌承重点估计</div>
          <div class="value" id="rightFootSpot">--</div>
          <div class="smallValue" id="rightFootDetail">趋势估计，不是真实足底压力中心</div>
        </div>
      </div>

      <h2>动作反馈</h2>
      <div id="insight"></div>
    </aside>

    <main id="stage">
      <canvas id="threeCanvas"></canvas>
      <div id="eventFlash">换刃</div>
      <div id="chartWrap">
        <canvas id="chartCanvas"></canvas>
      </div>
    </main>
  </div>

  <script src="three.min.js"></script>
  <script>
    // ============================================================
    // Web Bluetooth UUID：和 Arduino 固件中的 BLE UART UUID 保持一致
    // ============================================================
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    const MAX_POINTS = 240;
    const IS_ANDROID_APP = Boolean(window.SkiAndroid?.isAndroidApp?.());

    // 每块板各维护一份连接对象和最新数据。
    const boards = {
      L: createBoardState('L'),
      R: createBoardState('R')
    };

    const appState = {
      logging: false,
      logRecords: [],
      chartLeft: [],
      chartRight: [],
      lastEventCount: 0
    };

    function createBoardState(id) {
      return {
        id,
        connected: false,
        device: null,
        server: null,
        service: null,
        txChar: null,
        rxChar: null,
        buffer: '',
        lastPacketText: '',
        lastSeen: 0,
        data: {
          t: NaN,
          tp: NaN,
          h: NaN,
          ed: NaN,
          pd: NaN,
          yd: NaN,
          rr: NaN,
          pr: NaN,
          gm: NaN,
          am: NaN,
          ph: 'UNKNOWN',
          ec: 0,
          cal: 0,
          imu: 0
        }
      };
    }

    const el = {
      connectLeftBtn: document.getElementById('connectLeftBtn'),
      connectRightBtn: document.getElementById('connectRightBtn'),
      calibrateBtn: document.getElementById('calibrateBtn'),
      startLogBtn: document.getElementById('startLogBtn'),
      stopLogBtn: document.getElementById('stopLogBtn'),
      downloadLogBtn: document.getElementById('downloadLogBtn'),
      openReplayBtn: document.getElementById('openReplayBtn'),
      status: document.getElementById('status'),
      syncScore: document.getElementById('syncScore'),
      syncBadge: document.getElementById('syncBadge'),
      phaseBadge: document.getElementById('phaseBadge'),
      globalPhase: document.getElementById('globalPhase'),
      turnText: document.getElementById('turnText'),
      avgEdge: document.getElementById('avgEdge'),
      edgeChanges: document.getElementById('edgeChanges'),
      loadGuess: document.getElementById('loadGuess'),
      loadDetail: document.getElementById('loadDetail'),
      loadLeftBar: document.getElementById('loadLeftBar'),
      loadRightBar: document.getElementById('loadRightBar'),
      loadConfidenceBadge: document.getElementById('loadConfidenceBadge'),
      leftDot: document.getElementById('leftDot'),
      rightDot: document.getElementById('rightDot'),
      leftEdge: document.getElementById('leftEdge'),
      rightEdge: document.getElementById('rightEdge'),
      leftMeta: document.getElementById('leftMeta'),
      rightMeta: document.getElementById('rightMeta'),
      leftPhase: document.getElementById('leftPhase'),
      rightPhase: document.getElementById('rightPhase'),
      leftFootSpot: document.getElementById('leftFootSpot'),
      rightFootSpot: document.getElementById('rightFootSpot'),
      leftFootDetail: document.getElementById('leftFootDetail'),
      rightFootDetail: document.getElementById('rightFootDetail'),
      leftRaw: document.getElementById('leftRaw'),
      rightRaw: document.getElementById('rightRaw'),
      insight: document.getElementById('insight'),
      eventFlash: document.getElementById('eventFlash')
    };

    function phaseToCN(phase) {
      switch (phase) {
        case 'STILL': return '静止';
        case 'FLAT': return '平板';
        case 'LEFT_EDGE': return '左刃';
        case 'RIGHT_EDGE': return '右刃';
        case 'EDGE_CHANGE': return '换刃';
        default: return '未知';
      }
    }

    function fmtDeg(v) {
      return Number.isFinite(v) ? `${v.toFixed(1)}°` : '--';
    }

    function fmtSmall(v, unit = '') {
      return Number.isFinite(v) ? `${v.toFixed(1)}${unit}` : '--';
    }

    function pushPoint(arr, v) {
      arr.push(v);
      if (arr.length > MAX_POINTS) arr.shift();
    }

    function getConnectedBoards() {
      return Object.values(boards).filter(b => b.connected);
    }

    function bothHaveData() {
      return Number.isFinite(boards.L.data.ed) && Number.isFinite(boards.R.data.ed);
    }

    function estimateLoad(left, right) {
      if (!Number.isFinite(Number(left?.ed)) || !Number.isFinite(Number(right?.ed))) {
        return { leftRatio: NaN, rightRatio: NaN, dominant: '--', confidence: '低', reason: '等待左右板数据' };
      }

      const lEdge = Number(left.ed);
      const rEdge = Number(right.ed);
      const lAm = Number.isFinite(Number(left.am)) ? Number(left.am) : 1.0;
      const rAm = Number.isFinite(Number(right.am)) ? Number(right.am) : 1.0;
      const lRr = Math.abs(Number(left.rr || 0));
      const rRr = Math.abs(Number(right.rr || 0));
      const avgEdge = (lEdge + rEdge) / 2;
      const isChanging = left.ph === 'EDGE_CHANGE' || right.ph === 'EDGE_CHANGE' || Math.abs(avgEdge) < 5;

      let lRaw = 1.0 + Math.abs(lEdge) * 0.018 + Math.max(0, lAm - 0.96) * 0.9 - lRr * 0.0025;
      let rRaw = 1.0 + Math.abs(rEdge) * 0.018 + Math.max(0, rAm - 0.96) * 0.9 - rRr * 0.0025;

      // 基础平行转弯里，外板通常更承重。这里不求真实压力，只做趋势修正。
      if (!isChanging && Math.sign(lEdge) === Math.sign(rEdge)) {
        if (avgEdge > 0) rRaw *= 1.12;
        if (avgEdge < 0) lRaw *= 1.12;
      }

      lRaw = Math.max(0.15, lRaw);
      rRaw = Math.max(0.15, rRaw);
      const sum = lRaw + rRaw;
      const leftRatio = lRaw / sum;
      const rightRatio = rRaw / sum;
      const diff = Math.abs(leftRatio - rightRatio);
      const motion = Math.max(lRr, rRr);
      const confidence = isChanging || motion > 140 ? '低' : diff > 0.16 ? '中' : '中';
      const dominant = diff < 0.08 ? '接近均衡' : leftRatio > rightRatio ? '左脚' : '右脚';
      const reason = isChanging ? '换刃/平板阶段，承重正在转移' : '按外板、立刃稳定度和加速度趋势估计';

      return { leftRatio, rightRatio, dominant, confidence, reason };
    }

    function estimateFootSpot(board) {
      if (!Number.isFinite(Number(board?.ed)) || !Number.isFinite(Number(board?.pd))) {
        return { label: '--', detail: '等待姿态数据', confidence: '低' };
      }

      const edge = Number(board.ed);
      const pitch = Number(board.pd);
      const rr = Math.abs(Number(board.rr || 0));
      const pr = Math.abs(Number(board.pr || 0));
      const am = Number.isFinite(Number(board.am)) ? Number(board.am) : 1.0;

      const foreAft = pitch > 8 ? '偏前掌' : pitch < -8 ? '偏后跟' : '脚心附近';
      const side = edge > 10 ? '偏右侧刃' : edge < -10 ? '偏左侧刃' : '内外较居中';
      const confidence = rr > 120 || pr > 100 || Math.abs(am - 1) > 0.55 || board.ph === 'EDGE_CHANGE' ? '低' : '中';
      const label = `${foreAft} · ${side}`;
      const detail = `Pitch ${pitch.toFixed(1)}°，Edge ${edge.toFixed(1)}°，可信度 ${confidence}`;

      return { label, detail, confidence };
    }

    function computeMetrics() {
      const l = boards.L.data;
      const r = boards.R.data;
      const hasBoth = bothHaveData();

      if (!hasBoth) {
        return {
          hasBoth,
          sync: NaN,
          avgEdge: NaN,
          edgeDiff: NaN,
          globalPhase: '等待',
          turnText: '需要左右板都连接并收到数据',
          edgeChanges: Math.max(l.ec || 0, r.ec || 0),
          load: estimateLoad(l, r),
          feedback: [{ level: 'info', text: '先连接左右两个节点；双板平放、平行、静止后点击“静止校准”。' }]
        };
      }

      const leftEdge = l.ed;
      const rightEdge = r.ed;
      const edgeDiff = Math.abs(leftEdge - rightEdge);
      const absAvg = (Math.abs(leftEdge) + Math.abs(rightEdge)) / 2;
      const sync = Math.max(0, Math.min(100, 100 - edgeDiff * 4));
      const edgeChanges = Math.max(l.ec || 0, r.ec || 0);
      const load = estimateLoad(l, r);

      let globalPhase = '滑行';
      if (l.ph === 'EDGE_CHANGE' || r.ph === 'EDGE_CHANGE') globalPhase = '换刃';
      else if (Math.abs(leftEdge) < 4 && Math.abs(rightEdge) < 4) globalPhase = '平板';
      else if (Math.sign(leftEdge) === Math.sign(rightEdge)) globalPhase = leftEdge > 0 ? '同向立刃 +' : '同向立刃 -';
      else globalPhase = '板角分离';

      let turnText = '双板立刃方向一致';
      if (globalPhase === '换刃') turnText = 'Roll 接近零且角速度较高';
      if (globalPhase === '平板') turnText = '立刃不足或直滑';
      if (globalPhase === '板角分离') turnText = '左右板 Roll 符号相反，可能出现八字/内外板不同步';

      const feedback = [];
      if (sync >= 82) feedback.push({ level: 'good', text: '左右板立刃同步较好，双板平行感不错。' });
      else if (sync >= 60) feedback.push({ level: 'warn', text: '左右板立刃角有差异，注意两脚同时换刃，避免一只脚拖后。' });
      else feedback.push({ level: 'bad', text: '左右板角度差较大，可能有八字、板尾外甩或重心没有压到外板。' });

      if (absAvg < 5) feedback.push({ level: 'warn', text: '平均立刃角偏小，当前更像平板滑行；练习时可以逐步增加脚踝主动立刃。' });
      if (Math.abs((l.rr || 0) - (r.rr || 0)) > 55) feedback.push({ level: 'warn', text: '左右 Roll 角速度差较大，换刃动作可能不同步。' });
      if (Number.isFinite(load.leftRatio)) feedback.push({ level: 'info', text: `承重估计偏向：${load.dominant}。这是趋势估计，不是真实压力。` });
      if (l.cal !== 1 || r.cal !== 1) feedback.push({ level: 'info', text: '至少有一个节点还没有完成静止校准，角度只能作为临时参考。' });

      return { hasBoth, sync, avgEdge: absAvg, edgeDiff, globalPhase, turnText, edgeChanges, load, feedback };
    }

    function badgeClass(score) {
      if (!Number.isFinite(score)) return 'badge info';
      if (score >= 82) return 'badge good';
      if (score >= 60) return 'badge warn';
      return 'badge bad';
    }

    function flashEvent(text) {
      el.eventFlash.textContent = text;
      el.eventFlash.classList.add('show');
      clearTimeout(flashEvent.timer);
      flashEvent.timer = setTimeout(() => el.eventFlash.classList.remove('show'), 260);
    }

    function updateUI() {
      const l = boards.L.data;
      const r = boards.R.data;
      const metrics = computeMetrics();
      const connected = getConnectedBoards().map(b => b.id).join(', ') || '无';

      el.connectLeftBtn.textContent = boards.L.connected ? '断开左板' : '连接左板';
      el.connectRightBtn.textContent = boards.R.connected ? '断开右板' : '连接右板';
      el.connectLeftBtn.className = boards.L.connected ? 'danger' : '';
      el.connectRightBtn.className = boards.R.connected ? 'danger' : '';
      el.leftDot.className = boards.L.connected ? 'dot on' : 'dot';
      el.rightDot.className = boards.R.connected ? 'dot on' : 'dot';

      el.status.textContent = `已连接：${connected}${appState.logging ? '，记录中' : ''}`;

      el.syncScore.textContent = Number.isFinite(metrics.sync) ? `${metrics.sync.toFixed(0)}` : '--';
      el.syncBadge.textContent = Number.isFinite(metrics.sync) ? (metrics.sync >= 82 ? '好' : metrics.sync >= 60 ? '一般' : '偏差') : '--';
      el.syncBadge.className = badgeClass(metrics.sync);

      el.globalPhase.textContent = metrics.globalPhase;
      el.phaseBadge.textContent = metrics.globalPhase;
      el.phaseBadge.className = metrics.globalPhase === '板角分离' ? 'badge bad' : metrics.globalPhase === '换刃' ? 'badge info' : 'badge';
      el.turnText.textContent = metrics.turnText;
      el.avgEdge.textContent = fmtDeg(metrics.avgEdge);
      el.edgeChanges.textContent = String(metrics.edgeChanges || 0);
      if (Number.isFinite(metrics.load?.leftRatio)) {
        const leftPct = metrics.load.leftRatio * 100;
        const rightPct = 100 - leftPct;
        el.loadGuess.textContent = `${metrics.load.dominant} · 左 ${leftPct.toFixed(0)}% / 右 ${rightPct.toFixed(0)}%`;
        el.loadDetail.textContent = `${metrics.load.reason} · 可信度 ${metrics.load.confidence}`;
        el.loadLeftBar.style.width = `${leftPct}%`;
        el.loadRightBar.style.width = `${rightPct}%`;
        el.loadConfidenceBadge.textContent = metrics.load.confidence;
        el.loadConfidenceBadge.className = metrics.load.confidence === '低' ? 'badge warn' : 'badge info';
      } else {
        el.loadGuess.textContent = '--';
        el.loadDetail.textContent = metrics.load?.reason || '等待左右板数据';
        el.loadLeftBar.style.width = '50%';
        el.loadRightBar.style.width = '50%';
        el.loadConfidenceBadge.textContent = '--';
        el.loadConfidenceBadge.className = 'badge info';
      }

      el.leftEdge.textContent = fmtDeg(l.ed);
      el.rightEdge.textContent = fmtDeg(r.ed);
      el.leftPhase.textContent = phaseToCN(l.ph);
      el.rightPhase.textContent = phaseToCN(r.ph);
      const leftSpot = estimateFootSpot(l);
      const rightSpot = estimateFootSpot(r);
      el.leftFootSpot.textContent = leftSpot.label;
      el.rightFootSpot.textContent = rightSpot.label;
      el.leftFootDetail.textContent = leftSpot.detail;
      el.rightFootDetail.textContent = rightSpot.detail;

      el.leftMeta.textContent = boards.L.connected
        ? `温度 ${fmtSmall(l.tp, '°C')} · 角速度 ${fmtSmall(l.rr, '°/s')} · ${l.cal ? '已校准' : '未校准'}`
        : '未连接';
      el.rightMeta.textContent = boards.R.connected
        ? `温度 ${fmtSmall(r.tp, '°C')} · 角速度 ${fmtSmall(r.rr, '°/s')} · ${r.cal ? '已校准' : '未校准'}`
        : '未连接';

      el.leftRaw.textContent = boards.L.lastPacketText || '--';
      el.rightRaw.textContent = boards.R.lastPacketText || '--';

      el.insight.innerHTML = '';
      metrics.feedback.slice(0, 4).forEach(item => {
        const div = document.createElement('div');
        div.className = `feedback ${item.level}`;
        div.textContent = item.text;
        el.insight.appendChild(div);
      });

      if (metrics.edgeChanges > appState.lastEventCount) {
        appState.lastEventCount = metrics.edgeChanges;
        flashEvent('换刃');
      }
    }

    function applyBoardData(board, data) {
      // 固件会带 id 字段；如果烧录时忘了改左右，也允许网页连接按钮强制归入当前板。
      board.data = { ...board.data, ...data };
      board.lastSeen = Date.now();
      board.lastPacketText = JSON.stringify(data).slice(0, 86);

      if (Number.isFinite(Number(board.data.ed))) {
        pushPoint(board.id === 'L' ? appState.chartLeft : appState.chartRight, Number(board.data.ed));
      }

      if (appState.logging) {
        const record = {
          ts: Date.now(),
          side: board.id,
          ...data
        };
        appState.logRecords.push(record);
        if (IS_ANDROID_APP) {
          window.SkiAndroid.appendLogLine(JSON.stringify(record));
        }
      }

      updateUI();
    }

    window.AndroidBle = {
      handleNativeConnection(id, connected) {
        const board = boards[id];
        if (!board) return;
        board.connected = connected;
        if (!connected) {
          board.device = null;
          board.server = null;
          board.service = null;
          board.txChar = null;
          board.rxChar = null;
          board.buffer = '';
        }
        updateUI();
      },
      handleNativeLine(id, line) {
        const board = boards[id];
        if (!board) return;
        board.connected = true;
        try {
          applyBoardData(board, JSON.parse(line));
        } catch (err) {
          console.log('Native JSON parse failed:', line, err);
        }
      },
      handleNativeStatus(text) {
        el.status.textContent = text;
      }
    };

    function handleNotify(board, event) {
      const text = new TextDecoder().decode(event.target.value);
      board.buffer += text;

      let idx;
      while ((idx = board.buffer.indexOf('\n')) >= 0) {
        const line = board.buffer.slice(0, idx).trim();
        board.buffer = board.buffer.slice(idx + 1);
        if (!line) continue;

        try {
          applyBoardData(board, JSON.parse(line));
        } catch (err) {
          console.log('JSON parse failed:', line, err);
        }
      }

      // 防止异常分包导致缓存无限增长。
      if (board.buffer.length > 1500) {
        board.buffer = board.buffer.slice(-300);
      }
    }

    async function connectBoard(id) {
      if (IS_ANDROID_APP) {
        if (boards[id].connected) {
          window.SkiAndroid.disconnectBoard(id);
        } else {
          window.SkiAndroid.connectBoard(id);
          el.status.textContent = `正在连接 ${id} 板...`;
        }
        return;
      }

      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth。建议使用 Android Chrome 或桌面 Chrome，并通过 HTTPS 或 localhost 打开页面。');
        return;
      }

      const board = boards[id];

      if (board.connected) {
        await disconnectBoard(id);
        return;
      }

      board.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      board.device.addEventListener('gattserverdisconnected', () => {
        board.connected = false;
        board.device = null;
        board.server = null;
        board.service = null;
        board.txChar = null;
        board.rxChar = null;
        board.buffer = '';
        updateUI();
      });

      board.server = await board.device.gatt.connect();
      board.service = await board.server.getPrimaryService(SERVICE_UUID);
      board.txChar = await board.service.getCharacteristic(TX_UUID);
      board.rxChar = await board.service.getCharacteristic(RX_UUID);

      await board.txChar.startNotifications();
      board.txChar.addEventListener('characteristicvaluechanged', event => handleNotify(board, event));

      board.connected = true;
      board.buffer = '';
      updateUI();
    }

    async function disconnectBoard(id) {
      if (IS_ANDROID_APP) {
        window.SkiAndroid.disconnectBoard(id);
        return;
      }

      const board = boards[id];
      try {
        if (board.device && board.device.gatt.connected) {
          board.device.gatt.disconnect();
        }
      } finally {
        board.connected = false;
        board.device = null;
        board.server = null;
        board.service = null;
        board.txChar = null;
        board.rxChar = null;
        board.buffer = '';
        updateUI();
      }
    }

    async function sendCalibration() {
      if (IS_ANDROID_APP) {
        window.SkiAndroid.sendCalibration();
        flashEvent('校准');
        return;
      }

      const payload = new TextEncoder().encode('CAL\n');
      const targets = getConnectedBoards().filter(b => b.rxChar);

      if (targets.length === 0) {
        alert('请先连接至少一个 IMU 节点。');
        return;
      }

      for (const board of targets) {
        await board.rxChar.writeValue(payload);
      }

      flashEvent('校准');
      el.status.textContent = '已发送静止校准指令。请保持双板平放、平行、静止约 1 秒。';
    }

    el.connectLeftBtn.addEventListener('click', async () => {
      try { await connectBoard('L'); }
      catch (err) {
        if (!String(err.message || '').includes('User cancelled')) alert('左板连接失败：' + err.message);
      }
    });

    el.connectRightBtn.addEventListener('click', async () => {
      try { await connectBoard('R'); }
      catch (err) {
        if (!String(err.message || '').includes('User cancelled')) alert('右板连接失败：' + err.message);
      }
    });

    el.calibrateBtn.addEventListener('click', async () => {
      try { await sendCalibration(); }
      catch (err) { alert('发送校准失败：' + err.message); }
    });

    el.startLogBtn.addEventListener('click', () => {
      appState.logRecords = [];
      appState.logging = true;
      if (IS_ANDROID_APP) window.SkiAndroid.startLog();
      updateUI();
    });

    el.stopLogBtn.addEventListener('click', () => {
      appState.logging = false;
      if (IS_ANDROID_APP) window.SkiAndroid.stopLog();
      updateUI();
    });

    el.downloadLogBtn.addEventListener('click', () => {
      const content = appState.logRecords.map(row => JSON.stringify(row)).join('\n');
      if (IS_ANDROID_APP) {
        window.SkiAndroid.exportLog(content);
        return;
      }
      const blob = new Blob([content], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ski_imu_log_${Date.now()}.jsonl`;
      a.click();
      URL.revokeObjectURL(url);
    });

    el.openReplayBtn.addEventListener('click', () => {
      window.location.href = 'replay.html';
    });

    // ============================================================
    // Three.js 双雪板姿态展示
    // ============================================================
    const threeCanvas = document.getElementById('threeCanvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101820);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 1000);
    camera.position.set(0, 4.4, 8.8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    scene.add(new THREE.AmbientLight(0xffffff, 0.62));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.95);
    keyLight.position.set(4, 8, 6);
    scene.add(keyLight);

    const snow = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 10),
      new THREE.MeshPhongMaterial({ color: 0xdfeeed, shininess: 16 })
    );
    snow.rotation.x = -Math.PI / 2;
    snow.position.y = -0.12;
    scene.add(snow);

    const skiGroups = {
      L: createSkiMesh(-0.55, 0x2f80ed),
      R: createSkiMesh(0.55, 0xf97316)
    };

    function createSkiMesh(x, color) {
      const group = new THREE.Group();
      group.position.x = x;

      const ski = new THREE.Mesh(
        new THREE.BoxGeometry(0.32, 4.8, 0.08),
        new THREE.MeshPhongMaterial({ color, shininess: 70 })
      );
      ski.position.y = 0;
      group.add(ski);

      const boot = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.86, 0.28),
        new THREE.MeshPhongMaterial({ color: 0x23313b, shininess: 40 })
      );
      boot.position.z = 0.18;
      group.add(boot);

      const edge = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(0.32, 4.8, 0.08)),
        new THREE.LineBasicMaterial({ color: 0xffffff })
      );
      group.add(edge);

      scene.add(group);
      return group;
    }

    function resize3D() {
      const rect = threeCanvas.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / Math.max(1, rect.height);
      camera.updateProjectionMatrix();
    }

    function animate3D() {
      // ed 是相对校准零点的 Roll 角，转成弧度后映射到雪板侧倾。
      for (const id of ['L', 'R']) {
        const data = boards[id].data;
        const targetRoll = Number.isFinite(Number(data.ed)) ? Number(data.ed) * Math.PI / 180 : 0;
        const targetPitch = Number.isFinite(Number(data.pd)) ? Number(data.pd) * Math.PI / 360 : 0;
        skiGroups[id].rotation.y += (targetRoll - skiGroups[id].rotation.y) * 0.18;
        skiGroups[id].rotation.x += (targetPitch - skiGroups[id].rotation.x) * 0.12;
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate3D);
    }

    // ============================================================
    // 底部曲线：左右立刃角历史
    // ============================================================
    const chartCanvas = document.getElementById('chartCanvas');
    const chartCtx = chartCanvas.getContext('2d');

    function resizeChart() {
      const rect = chartCanvas.getBoundingClientRect();
      chartCanvas.width = rect.width * window.devicePixelRatio;
      chartCanvas.height = rect.height * window.devicePixelRatio;
      chartCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function drawLine(arr, color) {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;
      if (arr.length < 2) return;

      chartCtx.beginPath();
      chartCtx.strokeStyle = color;
      chartCtx.lineWidth = 2;

      for (let i = 0; i < arr.length; i++) {
        const x = (i / (MAX_POINTS - 1)) * w;
        const y = h / 2 - (arr[i] / 45) * (h * 0.42);
        if (i === 0) chartCtx.moveTo(x, y);
        else chartCtx.lineTo(x, y);
      }

      chartCtx.stroke();
    }

    function drawChart() {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;
      chartCtx.clearRect(0, 0, w, h);

      chartCtx.strokeStyle = 'rgba(255,255,255,0.12)';
      chartCtx.lineWidth = 1;
      chartCtx.beginPath();
      chartCtx.moveTo(0, h / 2);
      chartCtx.lineTo(w, h / 2);
      chartCtx.stroke();

      for (const deg of [-30, 30]) {
        const y = h / 2 - (deg / 45) * (h * 0.42);
        chartCtx.strokeStyle = 'rgba(255,255,255,0.07)';
        chartCtx.beginPath();
        chartCtx.moveTo(0, y);
        chartCtx.lineTo(w, y);
        chartCtx.stroke();
      }

      drawLine(appState.chartLeft, '#60a5fa');
      drawLine(appState.chartRight, '#fb923c');

      chartCtx.fillStyle = '#60a5fa';
      chartCtx.fillText('左板立刃角', 10, 18);
      chartCtx.fillStyle = '#fb923c';
      chartCtx.fillText('右板立刃角', 100, 18);
      chartCtx.fillStyle = 'rgba(255,255,255,0.7)';
      chartCtx.fillText('0°', w - 28, h / 2 - 6);

      requestAnimationFrame(drawChart);
    }

    window.addEventListener('resize', () => {
      resize3D();
      resizeChart();
    });

    resize3D();
    resizeChart();
    updateUI();
    requestAnimationFrame(animate3D);
    requestAnimationFrame(drawChart);
  </script>
</body>
</html>
