<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 步态识别</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #threeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #panel {
      position: absolute;
      left: 16px;
      top: 16px;
      width: 380px;
      background: rgba(0,0,0,0.60);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      z-index: 10;
    }
    #panel h2 {
      color: #38bdf8;
      margin-bottom: 12px;
      font-size: 20px;
    }
    #connectBtn {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      background: #22c55e;
      color: #08110b;
      margin-bottom: 10px;
    }
    #connectBtn.disconnect {
      background: #f59e0b;
      color: #1f1300;
    }
    #status {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 12px;
      min-height: 18px;
      line-height: 1.4;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .idle { background: #475569; color: #f8fafc; }
    .stance { background: #334155; color: #e2e8f0; }
    .lift { background: #2563eb; color: white; }
    .swing { background: #16a34a; color: white; }
    .strike { background: #dc2626; color: white; }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0;
    }
    .label { color: #94a3b8; }
    .value {
      color: #f8fafc;
      font-weight: bold;
      text-align: right;
      word-break: break-word;
      max-width: 220px;
    }

    #eventFlash {
      position: absolute;
      right: 20px;
      top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(220, 38, 38, 0.92);
      color: #fff;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.18s ease;
      pointer-events: none;
      z-index: 20;
    }
    #eventFlash.show {
      opacity: 1;
      transform: scale(1);
    }

    #chartWrap {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      height: 180px;
      background: rgba(0,0,0,0.45);
      border-radius: 16px;
      padding: 10px;
      pointer-events: none;
    }
    #chartCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="threeCanvas"></canvas>

    <div id="overlay">
      <div id="panel">
        <h2>ESP32 步态识别</h2>
        <button id="connectBtn">连接 BLE 设备</button>
        <div id="status">未连接</div>
        <div id="gaitBadge" class="badge idle">静止</div>

        <div class="row"><div class="label">步数</div><div class="value" id="steps">0</div></div>
        <div class="row"><div class="label">时间</div><div class="value" id="time">--</div></div>
        <div class="row"><div class="label">温度</div><div class="value" id="temp">--</div></div>
        <div class="row"><div class="label">湿度</div><div class="value" id="humidity">--</div></div>

        <div class="row"><div class="label">ax, ay, az</div><div class="value" id="accel">--</div></div>
        <div class="row"><div class="label">gx, gy, gz</div><div class="value" id="gyro">--</div></div>
        <div class="row"><div class="label">加速度模长</div><div class="value" id="accMag">--</div></div>
        <div class="row"><div class="label">角速度模长</div><div class="value" id="gyroMag">--</div></div>
        <div class="row"><div class="label">俯仰 / 横滚</div><div class="value" id="angles">--</div></div>
        <div class="row"><div class="label">最近原始包</div><div class="value" id="rawText">--</div></div>

        <div class="hint">
          规则法说明：<br />
          静止：角速度低且加速度接近 1g<br />
          抬脚：角速度升高<br />
          摆动：持续高角速度<br />
          落脚：出现冲击峰
        </div>
      </div>

      <div id="eventFlash">落脚</div>

      <div id="chartWrap">
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    const state = {
      connected: false,
      device: null,
      server: null,
      service: null,
      txChar: null,

      time: 0,
      temp: 0,
      humidity: 0,

      ax: 0, ay: 0, az: 0,
      gx: 0, gy: 0, gz: 0,
      acc_mag: 0,
      gyro_mag: 0,
      roll: 0,
      pitch: 0,
      yaw: 0,

      gait_state: 'IDLE',
      gait_state_cn: '静止',
      steps: 0,

      chartAcc: [],
      chartGyro: [],
      maxPoints: 180
    };

    let bleBuffer = '';

    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const gaitBadge = document.getElementById('gaitBadge');
    const stepsEl = document.getElementById('steps');
    const timeEl = document.getElementById('time');
    const tempEl = document.getElementById('temp');
    const humidityEl = document.getElementById('humidity');
    const accelEl = document.getElementById('accel');
    const gyroEl = document.getElementById('gyro');
    const accMagEl = document.getElementById('accMag');
    const gyroMagEl = document.getElementById('gyroMag');
    const anglesEl = document.getElementById('angles');
    const rawTextEl = document.getElementById('rawText');
    const eventFlash = document.getElementById('eventFlash');

    function deg(rad) {
      return rad * 180 / Math.PI;
    }

    function gaitStateToCN(s) {
      switch (s) {
        case 'IDLE': return '静止';
        case 'STANCE': return '支撑';
        case 'LIFT_OFF': return '抬脚';
        case 'SWING': return '摆动';
        case 'HEEL_STRIKE': return '落脚';
        default: return '未知';
      }
    }

    function updateBadge() {
      gaitBadge.textContent = state.gait_state_cn;
      gaitBadge.className = 'badge';

      if (state.gait_state === 'IDLE') gaitBadge.classList.add('idle');
      if (state.gait_state === 'STANCE') gaitBadge.classList.add('stance');
      if (state.gait_state === 'LIFT_OFF') gaitBadge.classList.add('lift');
      if (state.gait_state === 'SWING') gaitBadge.classList.add('swing');
      if (state.gait_state === 'HEEL_STRIKE') gaitBadge.classList.add('strike');
    }

    function flashEvent(text) {
      eventFlash.textContent = text;
      eventFlash.classList.add('show');
      clearTimeout(flashEvent._timer);
      flashEvent._timer = setTimeout(() => {
        eventFlash.classList.remove('show');
      }, 220);
    }

    function updateInfo() {
      statusEl.textContent = state.connected
        ? '已连接，正在接收 BLE 数据'
        : '未连接';

      connectBtn.textContent = state.connected ? '断开连接' : '连接 BLE 设备';
      connectBtn.className = state.connected ? 'disconnect' : '';

      updateBadge();

      stepsEl.textContent = String(state.steps);
      timeEl.textContent = Number.isFinite(state.time) ? state.time.toFixed(3) : '--';
      tempEl.textContent = Number.isFinite(state.temp) ? `${state.temp.toFixed(2)} °C` : '--';
      humidityEl.textContent = Number.isFinite(state.humidity) ? `${state.humidity.toFixed(1)} %` : '--';
      accelEl.textContent = `${state.ax.toFixed(2)}, ${state.ay.toFixed(2)}, ${state.az.toFixed(2)}`;
      gyroEl.textContent = `${state.gx.toFixed(2)}, ${state.gy.toFixed(2)}, ${state.gz.toFixed(2)}`;
      accMagEl.textContent = Number.isFinite(state.acc_mag) ? state.acc_mag.toFixed(3) : '--';
      gyroMagEl.textContent = Number.isFinite(state.gyro_mag) ? state.gyro_mag.toFixed(2) : '--';
      anglesEl.textContent = `${deg(state.pitch).toFixed(1)}° / ${deg(state.roll).toFixed(1)}°`;
    }

    function pushChartValue(arr, v) {
      arr.push(v);
      if (arr.length > state.maxPoints) arr.shift();
    }

    function applyData(data) {
      if (data.time !== undefined) state.time = Number(data.time);
      if (data.temp !== undefined) state.temp = Number(data.temp);
      if (data.humidity !== undefined) state.humidity = Number(data.humidity);

      if (data.ax !== undefined) state.ax = Number(data.ax);
      if (data.ay !== undefined) state.ay = Number(data.ay);
      if (data.az !== undefined) state.az = Number(data.az);

      if (data.gx !== undefined) state.gx = Number(data.gx);
      if (data.gy !== undefined) state.gy = Number(data.gy);
      if (data.gz !== undefined) state.gz = Number(data.gz);

      if (data.acc_mag !== undefined) {
        state.acc_mag = Number(data.acc_mag);
        pushChartValue(state.chartAcc, state.acc_mag);
      }

      if (data.gyro_mag !== undefined) {
        state.gyro_mag = Number(data.gyro_mag);
        pushChartValue(state.chartGyro, state.gyro_mag);
      }

      if (data.roll !== undefined) state.roll = Number(data.roll);
      if (data.pitch !== undefined) state.pitch = Number(data.pitch);
      if (data.yaw !== undefined) state.yaw = Number(data.yaw);

      if (data.steps !== undefined) state.steps = Number(data.steps);

      if (data.gait_state !== undefined) {
        const prev = state.gait_state;
        state.gait_state = String(data.gait_state);
        state.gait_state_cn = gaitStateToCN(state.gait_state);

        if (prev !== state.gait_state) {
          if (state.gait_state === 'HEEL_STRIKE') flashEvent('落脚');
          if (state.gait_state === 'LIFT_OFF') flashEvent('抬脚');
          if (state.gait_state === 'SWING') flashEvent('摆动');
        }
      }

      updateInfo();
    }

    function tryParseLine(line) {
      try {
        const data = JSON.parse(line);
        applyData(data);
        return true;
      } catch (e) {
        return false;
      }
    }

    function processBufferByNewline() {
      let progressed = false;
      let idx;
      while ((idx = bleBuffer.indexOf('\n')) >= 0) {
        const line = bleBuffer.slice(0, idx).trim();
        bleBuffer = bleBuffer.slice(idx + 1);
        if (line) {
          tryParseLine(line);
          progressed = true;
        }
      }
      return progressed;
    }

    function processBufferByBraces() {
      let start = -1;
      let depth = 0;
      let inString = false;
      let escaped = false;

      for (let i = 0; i < bleBuffer.length; i++) {
        const ch = bleBuffer[i];

        if (escaped) {
          escaped = false;
          continue;
        }

        if (ch === '\\') {
          if (inString) escaped = true;
          continue;
        }

        if (ch === '"') {
          inString = !inString;
          continue;
        }

        if (inString) continue;

        if (ch === '{') {
          if (depth === 0) start = i;
          depth++;
        } else if (ch === '}') {
          depth--;
          if (depth === 0 && start !== -1) {
            const jsonText = bleBuffer.slice(start, i + 1);
            const ok = tryParseLine(jsonText);
            bleBuffer = bleBuffer.slice(i + 1);
            if (!ok) {
              console.log('brace parse failed:', jsonText);
            }
            return true;
          }
        }
      }

      return false;
    }

    function processBleBuffer() {
      let progressed = true;
      while (progressed) {
        progressed = false;
        if (processBufferByNewline()) progressed = true;
        else if (processBufferByBraces()) progressed = true;
      }

      if (bleBuffer.length > 4096) {
        bleBuffer = bleBuffer.slice(-1024);
      }
    }

    function handleNotify(event) {
      const value = event.target.value;
      const text = new TextDecoder().decode(value);

      rawTextEl.textContent = text.slice(0, 60).replace(/\n/g, '\\n');
      bleBuffer += text;
      processBleBuffer();
    }

    function onDisconnected() {
      state.connected = false;
      state.device = null;
      state.server = null;
      state.service = null;
      state.txChar = null;
      bleBuffer = '';
      rawTextEl.textContent = '--';
      updateInfo();
    }

    async function connectBLE() {
      if (!navigator.bluetooth) {
        alert('当前浏览器不支持 Web Bluetooth。请使用 Android Chrome，并通过 HTTPS 打开页面。');
        return;
      }

      state.device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      state.device.addEventListener('gattserverdisconnected', onDisconnected);

      state.server = await state.device.gatt.connect();
      state.service = await state.server.getPrimaryService(SERVICE_UUID);
      state.txChar = await state.service.getCharacteristic(TX_UUID);

      await state.txChar.startNotifications();
      state.txChar.addEventListener('characteristicvaluechanged', handleNotify);

      state.connected = true;
      bleBuffer = '';
      updateInfo();
    }

    async function disconnectBLE() {
      try {
        if (state.txChar) {
          state.txChar.removeEventListener('characteristicvaluechanged', handleNotify);
        }
        if (state.device && state.device.gatt.connected) {
          state.device.gatt.disconnect();
        }
      } finally {
        onDisconnected();
      }
    }

    connectBtn.addEventListener('click', async () => {
      try {
        if (state.connected) {
          await disconnectBLE();
        } else {
          await connectBLE();
        }
      } catch (err) {
        console.error(err);
        if (err && err.message && err.message.includes('User cancelled')) return;
        alert('连接失败: ' + err.message);
      }
    });

    const threeCanvas = document.getElementById('threeCanvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(2.2, 0.4, 8);

    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const dir = new THREE.DirectionalLight(0xffffff, 0.9);
    dir.position.set(6, 5, 8);
    scene.add(dir);

    const boardGroup = new THREE.Group();
    scene.add(boardGroup);

    const pcbGeo = new THREE.BoxGeometry(2.2, 4.4, 0.18);
    const pcbMat = new THREE.MeshPhongMaterial({ color: 0x0f9d58 });
    const pcb = new THREE.Mesh(pcbGeo, pcbMat);
    boardGroup.add(pcb);

    const edges = new THREE.EdgesGeometry(pcbGeo);
    const edgeLines = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
    boardGroup.add(edgeLines);

    const axes = new THREE.AxesHelper(3);
    scene.add(axes);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      resizeChart();
    });

    let dragging = false, lx = 0, ly = 0;
    threeCanvas.addEventListener('mousedown', e => {
      dragging = true; lx = e.clientX; ly = e.clientY;
    });
    threeCanvas.addEventListener('mousemove', e => {
      if (!dragging) return;
      camera.position.x += (e.clientX - lx) * 0.008;
      camera.position.y -= (e.clientY - ly) * 0.008;
      lx = e.clientX; ly = e.clientY;
    });
    threeCanvas.addEventListener('mouseup', () => dragging = false);
    threeCanvas.addEventListener('mouseleave', () => dragging = false);

    threeCanvas.addEventListener('wheel', e => {
      e.preventDefault();
      camera.position.z = Math.max(3, Math.min(18, camera.position.z + e.deltaY * 0.001));
    }, { passive: false });

    function animate3D() {
      boardGroup.rotation.x = state.roll;
      boardGroup.rotation.z = state.pitch;
      boardGroup.rotation.y = state.yaw * 0.25;

      renderer.render(scene, camera);
      requestAnimationFrame(animate3D);
    }

    const chartCanvas = document.getElementById('chartCanvas');
    const chartCtx = chartCanvas.getContext('2d');

    function resizeChart() {
      const rect = chartCanvas.getBoundingClientRect();
      chartCanvas.width = rect.width * devicePixelRatio;
      chartCanvas.height = rect.height * devicePixelRatio;
      chartCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function drawLine(arr, color, maxVal, minVal) {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;
      if (arr.length < 2) return;

      chartCtx.beginPath();
      chartCtx.strokeStyle = color;
      chartCtx.lineWidth = 2;

      for (let i = 0; i < arr.length; i++) {
        const x = (i / (state.maxPoints - 1)) * w;
        const yNorm = (arr[i] - minVal) / (maxVal - minVal + 1e-6);
        const y = h - yNorm * h;
        if (i === 0) chartCtx.moveTo(x, y);
        else chartCtx.lineTo(x, y);
      }
      chartCtx.stroke();
    }

    function drawChart() {
      const w = chartCanvas.clientWidth;
      const h = chartCanvas.clientHeight;

      chartCtx.clearRect(0, 0, w, h);

      chartCtx.strokeStyle = 'rgba(255,255,255,0.08)';
      chartCtx.lineWidth = 1;
      for (let i = 1; i < 4; i++) {
        const y = (h / 4) * i;
        chartCtx.beginPath();
        chartCtx.moveTo(0, y);
        chartCtx.lineTo(w, y);
        chartCtx.stroke();
      }

      drawLine(state.chartAcc, '#22c55e', 2.2, 0.6);
      drawLine(state.chartGyro, '#38bdf8', 220, 0);

      chartCtx.fillStyle = '#22c55e';
      chartCtx.fillText('加速度模长', 10, 16);

      chartCtx.fillStyle = '#38bdf8';
      chartCtx.fillText('角速度模长', 100, 16);

      requestAnimationFrame(drawChart);
    }

    resizeChart();
    updateInfo();
    requestAnimationFrame(animate3D);
    requestAnimationFrame(drawChart);
  </script>
</body>
</html>
